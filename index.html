<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Ultra</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body,html{margin:0;padding:0;background:#000;font-family:sans-serif;color:white;overflow:hidden;height:100%;width:100%;position:fixed;}
.main-wrapper{display:flex;flex-direction:column;height:100dvh;width:100vw;}
.video-grid{flex:1;position:relative;background:#111;overflow:hidden;transition:0.3s;}

/* Voice Pulse Border Animation */
.voice-border{box-shadow:inset 0 0 20px #ff0055, 0 0 30px #ff0055 !important; border: 3px solid #ff0055;}

#remoteVideo{width:100%;height:100%;object-fit:cover;background:#111;}
#localVideo{position:absolute;bottom:10px;right:10px;width:100px;height:140px;border:2px solid #55eefc;border-radius:12px;z-index:100;object-fit:cover;background:#222;}
#magicCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:80;pointer-events:none;}
.side-controls{position:absolute;left:10px;top:20%;display:flex;flex-direction:column;gap:15px;z-index:110;}
.control-btn{width:45px;height:45px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);color:white;font-size:18px;cursor:pointer;}
#emojiPanel{position:absolute;right:10px;top:30%;background:rgba(0,0,0,0.8);padding:10px;border-radius:12px;display:none;flex-wrap:wrap;width:150px;gap:6px;z-index:200;}
.emoji-item{font-size:25px;cursor:pointer;}
.emoji-rain{position:absolute;font-size:45px;animation:emojiFall 2s linear forwards;z-index:300;}
@keyframes emojiFall{0%{transform:translateY(-50px);opacity:1;}100%{transform:translateY(110vh);opacity:0;}}
.heart{position:absolute;font-size:70px;animation:heartUp 1.5s forwards;pointer-events:none;z-index:300;}
@keyframes heartUp{0%{transform:scale(.5);opacity:1;}100%{transform:translateY(-200px) scale(1.4);opacity:0;}}
.info-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);padding:5px 12px;border-radius:20px;font-size:12px;z-index:110;}
#chatBox{position:absolute;bottom:10px;left:10px;width:65%;max-height:120px;overflow-y:auto;z-index:110;}
.action-bar{height:70px;background:#000;border-top:1px solid #222;display:flex;align-items:center;padding:0 10px;gap:8px;}
.next-btn{background:#ff0055;border:none;padding:12px 20px;border-radius:25px;color:white;font-weight:bold;cursor:pointer;}
input{flex:1;background:#1a1a1a;border:1px solid #333;padding:12px 15px;border-radius:25px;color:white;}
.send-btn{background:#333;border:none;padding:12px 18px;border-radius:25px;color:white;}
#entry{position:fixed;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;font-size:35px;color:#ff0055;z-index:2000;font-weight:bold;letter-spacing:5px;}
</style>
</head>

<body>

<div id="entry">SYKO LIVE</div>

<div class="main-wrapper">
    <div class="video-grid" id="videoGrid">
        <div class="info-tag">Online: <span id="count">1</span> | <span id="status">Connecting...</span></div>
        <canvas id="magicCanvas"></canvas>
        <div id="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div class="side-controls">
            <button class="control-btn" id="micBtn">🎤</button>
            <button class="control-btn" id="vidBtn">🎥</button>
            <button class="control-btn" id="drawBtn">✏️</button>
            <button class="control-btn" id="clearBtn">🗑️</button>
            <button class="control-btn" id="emojiBtn">😊</button>
        </div>

        <div id="emojiPanel">
            <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">😍</span>
            <span class="emoji-item">😎</span><span class="emoji-item">😜</span><span class="emoji-item">😱</span>
            <span class="emoji-item">❤️</span><span class="emoji-item">👍</span>
        </div>
    </div>

    <div class="action-bar">
        <button class="next-btn" id="nextBtn">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="send-btn" id="sendBtn">SEND</button>
    </div>
</div>

<script>
// --- Configuration ---
// ಗಮನಿಸಿ: ಇಲ್ಲಿ ನಿಮ್ಮ Firebase Config ಹಾಕಿದರೆ Online Count ಕೆಲಸ ಮಾಡುತ್ತದೆ.
const firebaseConfig = { databaseURL: "https://YOUR-DB-NAME.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- Entry Screen ---
setTimeout(() => {
    const entry = document.getElementById("entry");
    entry.style.transition = "1s";
    entry.style.opacity = "0";
    setTimeout(() => entry.style.display = "none", 1000);
}, 2500);

// --- Peer & Video Connection ---
const peer = new Peer();
let localStream;
let currentCall;

navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
    localStream = stream;
    document.getElementById("localVideo").srcObject = stream;
    document.getElementById("status").innerText = "Ready to Chat";
    
    // Voice Lighting Logic
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function updateVoiceBorder() {
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        let average = sum / bufferLength;
        if (average > 30) {
            document.getElementById("videoGrid").classList.add("voice-border");
        } else {
            document.getElementById("videoGrid").classList.remove("voice-border");
        }
        requestAnimationFrame(updateVoiceBorder);
    }
    updateVoiceBorder();
});

peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', remoteStream => {
        document.getElementById("remoteVideo").srcObject = remoteStream;
    });
});

// --- Drawing Logic ---
const canvas = document.getElementById("magicCanvas");
const ctx = canvas.getContext("2d");
let drawingEnabled = false;

function setupCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = setupCanvas;
setupCanvas();

document.getElementById("drawBtn").onclick = function() {
    drawingEnabled = !drawingEnabled;
    this.style.background = drawingEnabled ? "#ff0055" : "rgba(255,255,255,0.2)";
    canvas.style.pointerEvents = drawingEnabled ? "auto" : "none";
};

document.getElementById("clearBtn").onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

let isDrawing = false;
canvas.onmousedown = (e) => { if(drawingEnabled) { isDrawing = true; ctx.beginPath(); } };
canvas.onmousemove = (e) => {
    if(!isDrawing) return;
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#55eefc";
    ctx.lineTo(e.clientX, e.clientY);
    ctx.stroke();
};
canvas.onmouseup = () => isDrawing = false;

// --- Emoji Rain ---
document.getElementById("emojiBtn").onclick = () => {
    const p = document.getElementById("emojiPanel");
    p.style.display = p.style.display === "flex" ? "none" : "flex";
};

document.querySelectorAll(".emoji-item").forEach(el => {
    el.onclick = () => {
        for(let i=0; i<15; i++) {
            let s = document.createElement("span");
            s.className = "emoji-rain";
            s.innerText = el.innerText;
            s.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 2000);
        }
    };
});

// --- Online Count (Firebase) ---
const countRef = db.ref("online_users");
countRef.on("value", snap => {
    document.getElementById("count").innerText = snap.val() || 1;
});
</script>

</body>
</html>
