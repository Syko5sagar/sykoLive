<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Syko Live - Fixed & Updated</title>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; height: 100%; width: 100%; position: fixed; }
        .main-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100vw; }
        .video-grid { flex: 1; position: relative; background: #111; overflow: hidden; }

        /* 🎤 Voice Lighting Border */
        .voice-border { box-shadow: inset 0 0 50px #ff0055, 0 0 30px #ff0055 !important; border: 4px solid #ff0055 !important; transition: 0.1s; }

        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; bottom: 10px; right: 10px; width: 110px; height: 150px; border: 2px solid #55eefc; border-radius: 12px; z-index: 100; object-fit: cover; background: #222; }
        
        #magicCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 80; pointer-events: none; }

        .side-controls { position: absolute; left: 10px; top: 15%; display: flex; flex-direction: column; gap: 12px; z-index: 110; }
        .control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 😊 Emoji Rain */
        #emojiPanel { position: absolute; right: 10px; top: 30%; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; display: none; flex-wrap: wrap; width: 140px; gap: 8px; z-index: 200; }
        .emoji-item { font-size: 24px; cursor: pointer; }
        .emoji-rain { position: absolute; font-size: 40px; animation: emojiFall 2s linear forwards; z-index: 300; pointer-events: none; }
        @keyframes emojiFall { 0% { transform: translateY(-100px); opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }

        .info-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 6px 15px; border-radius: 20px; font-size: 12px; z-index: 110; }
        #status { color: #00ff00; font-weight: bold; }

        .action-bar { height: 80px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        .next-btn { background: #ff0055; border: none; padding: 12px 25px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 20px; border-radius: 30px; color: white; outline: none; }
        .send-btn { background: #333; border: none; padding: 12px 20px; border-radius: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="video-grid" id="videoGrid">
        <div class="info-tag">Online: <span id="count">1</span> | Status: <span id="status">Ready</span></div>
        <canvas id="magicCanvas"></canvas>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div class="side-controls">
            <button class="control-btn" id="micBtn">🎤</button>
            <button class="control-btn" id="vidBtn">🎥</button>
            <button class="control-btn" id="flipBtn">🔄</button> <button class="control-btn" id="drawBtn">✏️</button>
            <button class="control-btn" id="clearBtn">🗑️</button>
            <button class="control-btn" id="emojiBtn">😊</button> </div>

        <div id="emojiPanel">
            <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">😍</span>
            <span class="emoji-item">❤️</span><span class="emoji-item">👍</span><span class="emoji-item">😱</span>
        </div>
    </div>

    <div class="action-bar">
        <button class="next-btn" id="nextBtn">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="send-btn" id="sendBtn">SEND</button>
    </div>
</div>

<script>
// --- Firebase Setup ---
const firebaseConfig = { databaseURL: "https://sykolive-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- PeerJS & Variables ---
const peer = new Peer();
let localStream, myID, currentCall;
let currentFacingMode = "user"; 

// --- 1. Camera Initialization ---
async function startCamera() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode }, audio: true
        });
        document.getElementById("localVideo").srcObject = localStream;
        setupVoiceLighting(localStream); // 🎤 NEW
    } catch (e) { console.error("Camera error:", e); }
}

// --- 2. Random Connection Logic (Fixed) ---
peer.on('open', id => {
    myID = id;
    db.ref("online_users/" + id).set({ status: "waiting" });
    db.ref("online_users/" + id).onDisconnect().remove();
    findMatch();
});

function findMatch() {
    db.ref("online_users").once("value", snapshot => {
        snapshot.forEach(child => {
            if (child.key !== myID && child.val().status === "waiting") {
                const call = peer.call(child.key, localStream);
                db.ref("online_users/" + myID).update({ status: "busy" });
                db.ref("online_users/" + child.key).update({ status: "busy" });
                handleCall(call);
            }
        });
    });
}

peer.on('call', call => {
    call.answer(localStream);
    handleCall(call);
});

function handleCall(call) {
    currentCall = call;
    call.on('stream', rs => {
        document.getElementById("remoteVideo").srcObject = rs;
        document.getElementById("status").innerText = "Connected!";
    });
}

// --- 3. Added Features (As requested) ---

// 🔄 Camera Flip
document.getElementById("flipBtn").onclick = () => {
    currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
    startCamera();
};

// 🎤 Voice Lighting
function setupVoiceLighting(stream) {
    const audioCtx = new AudioContext();
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    function update() {
        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b) => a+b)/data.length;
        document.getElementById("videoGrid").classList.toggle("voice-border", avg > 30);
        requestAnimationFrame(update);
    }
    update();
}

// 😊 Emoji Rain
document.getElementById("emojiBtn").onclick = () => {
    const p = document.getElementById("emojiPanel");
    p.style.display = p.style.display === "flex" ? "none" : "flex";
};
document.querySelectorAll(".emoji-item").forEach(el => {
    el.onclick = () => {
        for(let i=0; i<20; i++) {
            let s = document.createElement("span");
            s.className = "emoji-rain"; s.innerText = el.innerText;
            s.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 2000);
        }
    };
});

// ✏️ Drawing
const canvas = document.getElementById("magicCanvas");
const ctx = canvas.getContext("2d");
let isDrawing = false;
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
document.getElementById("drawBtn").onclick = () => {
    isDrawing = !isDrawing;
    canvas.style.pointerEvents = isDrawing ? "auto" : "none";
};
canvas.onpointermove = e => { if(isDrawing && e.buttons === 1) { ctx.fillStyle = "#55eefc"; ctx.fillRect(e.clientX, e.clientY, 5, 5); } };
document.getElementById("clearBtn").onclick = () => ctx.clearRect(0,0,canvas.width,canvas.height);

// Online Count
db.ref("online_users").on("value", s => document.getElementById("count").innerText = s.numChildren() || 1);

// Next & Initial
document.getElementById("nextBtn").onclick = () => location.reload();
startCamera();
</script>
</body>
</html>
