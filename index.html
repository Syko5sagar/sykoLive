<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Syko Live Pro V3 - Audio Reactive</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body, html { margin:0; padding:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; width: 100%; position: fixed; }
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; }
.letter { font-size: 40px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px #ff0055; opacity: 0; animation: bounceIn 0.5s forwards; }
@keyframes bounceIn { to { opacity: 1; transform: scale(1); } }
.main-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100vw; position: relative; }

/* ವಾಯ್ಸ್ ರಿಯಾಕ್ಟಿವ್ ಬಾರ್ಡರ್ ಗಾಗಿ ವಿಡಿಯೋ ಗ್ರಿಡ್ ಅಪ್ಡೇಟ್ */
.video-grid { 
    flex: 1; position: relative; display: flex; background: #111; overflow: hidden; 
    justify-content: center; align-items: center;
    border: 4px solid transparent; /* ಇನಿಶಿಯಲ್ ಬಾರ್ಡರ್ */
    transition: border-color 0.1s ease-out;
}

#remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
#localVideo { position: absolute; bottom: 20px; right: 15px; width: 100px; height: 140px; border: 2px solid #55eefc; border-radius: 12px; z-index: 10; object-fit: cover; background: #222; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.side-controls { position: absolute; left: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; }
.control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.15); color: white; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
.control-btn.off { background: rgba(255, 0, 0, 0.6); }
#chatBox { position: absolute; bottom: 10px; left: 15px; width: 65%; max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 10px; font-size: 13px; z-index: 5; pointer-events: none; scroll-behavior: smooth; }
.msg-tag { font-weight: bold; color: #55eefc; }
.action-bar { height: 70px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 10px; gap: 8px; z-index: 30; padding-bottom: env(safe-area-inset-bottom); }
.next-btn { background: #ff0055; border: none; padding: 10px 18px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
input { flex: 1; background: #222; border: none; padding: 10px 15px; border-radius: 20px; color: white; outline: none; font-size: 14px; }
.send-btn { background: #333; border: none; padding: 10px 15px; border-radius: 20px; color: white; cursor: pointer; font-size: 13px; }
.info-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; font-size: 11px; z-index: 100; border: 1px solid rgba(255,0,85,0.5); }
@media (min-width: 768px) { #localVideo { width: 180px; height: 135px; bottom: 25px; right: 25px; } #chatBox { width: 350px; bottom: 20px; } }
</style>
</head>

<body>
<div id="entry">
    <div id="logoText"></div>
</div>

<div class="main-wrapper">
    <div class="video-grid" id="mainContainer">
        <div class="info-tag">Online: <span id="onlineCount">0</span> | <span id="status">ಸಿದ್ಧವಾಗುತ್ತಿದೆ...</span></div>
        <div id="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div class="side-controls">
            <button class="control-btn" id="micBtn" onclick="toggleAudio()">🎤</button>
            <button class="control-btn" id="vidBtn" onclick="toggleVideo()">🎥</button>
            <button class="control-btn" id="flipBtn" onclick="flipCamera()">🔄</button>
        </div>
    </div>

    <div class="action-bar">
        <button class="next-btn" onclick="findStranger()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="send-btn" onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
// --- Firebase Config (ನಿಮ್ಮ ಕೀಗಳನ್ನು ಇಲ್ಲಿ ಹಾಕಿ) ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY", 
  authDomain: "sykolive-846a3.firebaseapp.com",
  databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/",
  projectId: "sykolive-846a3",
  storageBucket: "sykolive-846a3.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const lobby = db.ref("lobby");
const online = db.ref("online");

const logoContainer = document.getElementById("logoText");
"SYKOLIVE".split("").forEach((c, i) => {
    const span = document.createElement("span");
    span.innerText = c; span.className = "letter";
    span.style.animationDelay = `${i * 0.1}s`;
    logoContainer.appendChild(span);
});
setTimeout(() => { document.getElementById("entry").style.display = "none"; startApp(); }, 3000);

let peer, myId, myStream, currentCall, conn, facing="user";
let isConnected = false;
let audioContext, analyser, dataArray, animationId;

async function startApp() {
    try {
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: true });
        document.getElementById("localVideo").srcObject = myStream;
        setupVoiceVisualizer(myStream); // ವಾಯ್ಸ್ ಫೀಚರ್ ಚಾಲನೆ
        setupPeer();
    } catch(e) { alert("ಕ್ಯಾಮೆರಾ ಮತ್ತು ಮೈಕ್ ಅನುಮತಿ ನೀಡಿ!"); }
}

// ಮಾತಿನ ತೀವ್ರತೆಗೆ ತಕ್ಕಂತೆ ಬಾರ್ಡರ್ ಕಲರ್ ಚೇಂಜ್ ಮಾಡುವ ಲಾಜಿಕ್
function setupVoiceVisualizer(stream) {
    if (audioContext) audioContext.close();
    
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);

    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    function updateBorder() {
        animationId = requestAnimationFrame(updateBorder);
        analyser.getByteFrequencyData(dataArray);

        let sum = 0;
        for (let i = 0; i < bufferLength; i++) {
            sum += dataArray[i];
        }
        let average = sum / bufferLength;
        
        // ಬಾರ್ಡರ್ ಕಲರ್ ಅಪ್ಡೇಟ್ (ಸರಾಸರಿ ವಾಯ್ಸ್ ಲೆವೆಲ್ ಮೇಲೆ)
        const container = document.getElementById("mainContainer");
        if (average > 10) {
            let intensity = Math.min(average * 2, 255);
            container.style.borderColor = `rgb(${intensity}, 0, 85)`; // ಗುಲಾಬಿ/ಕೆಂಪು ಛಾಯೆ
            container.style.boxShadow = `inset 0 0 ${average/2}px rgb(${intensity}, 0, 85)`;
        } else {
            container.style.borderColor = "transparent";
            container.style.boxShadow = "none";
        }
    }
    updateBorder();
}

function setupPeer() {
    peer = new Peer({ 
        config: { 
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' }, 
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        }
    });
    
    peer.on("open", id => {
        myId = id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });

    peer.on("call", call => {
        if (isConnected) return;
        currentCall = call;
        call.answer(myStream);
        call.on("stream", s => { 
            document.getElementById("remoteVideo").srcObject = s;
            markAsConnected();
        });
    });

    peer.on("connection", c => {
        conn = c;
        conn.on("data", data => addChat("Stranger", data));
    });

    online.on("value", s => { document.getElementById("onlineCount").innerText = s.numChildren() || 0; });
}

function markAsConnected() {
    isConnected = true;
    document.getElementById("status").innerText = "Connected!";
    lobby.child(myId).remove();
}

function findStranger() {
    isConnected = false;
    lobby.off(); 
    if(currentCall) { currentCall.close(); currentCall = null; }
    if(conn) { conn.close(); conn = null; }
    
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("status").innerText = "Searching...";
    document.getElementById("chatBox").innerHTML = "";

    lobby.once("value", snap => {
        let waitingUsers = [];
        snap.forEach(child => {
            if(child.val() !== myId) waitingUsers.push(child.val());
        });

        if(waitingUsers.length > 0) {
            let randomUser = waitingUsers[Math.floor(Math.random() * waitingUsers.length)];
            lobby.child(randomUser).remove(); 
            connectTo(randomUser);
        } else {
            lobby.child(myId).set(myId);
            lobby.child(myId).onDisconnect().remove();
            document.getElementById("status").innerText = "Waiting...";
            
            lobby.on("child_added", s => {
                if(s.val() !== myId && !isConnected) {
                    lobby.off(); 
                    findStranger();
                }
            });
        }
    });
}

function connectTo(id) {
    conn = peer.connect(id);
    conn.on("open", () => {
        conn.on("data", data => addChat("Stranger", data));
    });
    
    currentCall = peer.call(id, myStream);
    currentCall.on("stream", s => { 
        document.getElementById("remoteVideo").srcObject = s;
        markAsConnected();
    });
}

function sendMsg() {
    const val = document.getElementById("chatInput").value;
    if(val && conn) {
        conn.send(val);
        addChat("You", val);
        document.getElementById("chatInput").value = "";
    }
}

function addChat(user, msg) {
    const box = document.getElementById("chatBox");
    box.innerHTML += `<div><span class="msg-tag">${user}:</span> ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

function toggleAudio() {
    const audio = myStream.getAudioTracks()[0];
    audio.enabled = !audio.enabled;
    document.getElementById("micBtn").classList.toggle("off", !audio.enabled);
}

function toggleVideo() {
    const video = myStream.getVideoTracks()[0];
    video.enabled = !video.enabled;
    document.getElementById("vidBtn").classList.toggle("off", !video.enabled);
}

async function flipCamera() {
    if (!myStream) return;
    facing = (facing === "user") ? "environment" : "user";
    
    try {
        const newStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: facing }, 
            audio: true 
        });

        const videoTrack = newStream.getVideoTracks()[0];
        const audioTrack = newStream.getAudioTracks()[0];

        document.getElementById("localVideo").srcObject = newStream;

        if (currentCall && currentCall.peerConnection) {
            const senders = currentCall.peerConnection.getSenders();
            const vSender = senders.find(s => s.track && s.track.kind === 'video');
            if (vSender) vSender.replaceTrack(videoTrack);

            const aSender = senders.find(s => s.track && s.track.kind === 'audio');
            if (aSender) aSender.replaceTrack(audioTrack);
        }

        myStream.getTracks().forEach(t => t.stop());
        myStream = newStream;
        setupVoiceVisualizer(myStream); // ಹೊಸ ಸ್ಟ್ರೀಮ್‌ಗೆ ವಿಲುವಲೈಜರ್ ಮರುಹೊಂದಿಸಿ

    } catch (e) {
        console.error(e);
    }
}

document.getElementById("chatInput").onkeypress = (e) => { if(e.key === "Enter") sendMsg(); };
</script>
</body>
</html>
