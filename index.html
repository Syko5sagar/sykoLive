<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Syko Live Pro V3 - Cinematic Entry</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
:root { --primary: #ff0055; --secondary: #55eefc; }
body, html { margin:0; padding:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; width: 100%; position: fixed; }

/* --- ಹೊಸ ಎಂಟ್ರಿ ಲೋಗೋ ಸ್ಟೈಲ್ --- */
#power-sequence-entry {
    position: fixed; width: 100%; height: 100%; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10000; font-family: 'Montserrat', sans-serif;
}
#fxCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
.content-entry { position: relative; z-index: 10; text-align: center; }
.logo-box { display: flex; gap: 12px; margin-bottom: 25px; }
.letter { font-size: clamp(40px, 12vw, 100px); font-weight: 900; opacity: 0; display: inline-block; }
.instagram-tag { display: flex; align-items: center; justify-content: center; gap: 10px; color: #fff; opacity: 0; transform: translateY(20px); font-size: clamp(14px, 3vw, 18px); letter-spacing: 2px; }
.insta-icon { width: 24px; height: 24px; border-radius: 6px; background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); display: flex; align-items: center; justify-content: center; }

/* --- ಆಪ್ ಡಿಸೈನ್ ಸ್ಟೈಲ್ --- */
.voice-glowing { box-shadow: inset 0 0 20px var(--secondary), 0 0 30px var(--secondary) !important; border: 3px solid var(--secondary) !important; transition: 0.1s; }
.video-grid { position: relative; width: 100%; height: calc(100dvh - 75px); background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
#localVideo { position: absolute; bottom: 20px; right: 15px; width: 110px; height: 150px; border: 2px solid var(--primary); border-radius: 12px; z-index: 10; object-fit: cover; background: #222; transition: filter 0.3s; }
.side-controls { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 20; }
.control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.15); color: white; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
.control-btn.off { background: rgba(255, 0, 0, 0.6); }
#chatBox { position: absolute; bottom: 10px; left: 15px; width: 65%; max-height: 150px; overflow-y: auto; z-index: 5; pointer-events: none; }
.msg-item { background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; pointer-events: auto; border-left: 3px solid var(--primary); }
.action-bar { height: 75px; background: #000; display: flex; align-items: center; padding: 0 10px; gap: 8px; border-top: 1px solid #222; }
.next-btn { background: var(--primary); border: none; padding: 12px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; flex-shrink: 0; }
input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
#emojiPanel { position: absolute; left: 70px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.85); padding: 12px; border-radius: 15px; display: none; flex-direction: column; gap: 12px; z-index: 25; border: 1px solid #333; }
.emoji-item { font-size: 28px; cursor: pointer; }
.emoji-rain { position: fixed; top: -10dvh; font-size: 35px; z-index: 1000; animation: rainFall 2.5s linear forwards; pointer-events: none; }
@keyframes rainFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110dvh) rotate(360deg); opacity: 0; } }
.info-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 11px; z-index: 100; border: 1px solid var(--primary); }
</style>
</head>

<body>

<div id="power-sequence-entry">
  <canvas id="fxCanvas"></canvas>
  <div class="content-entry">
    <div class="logo-box" id="logoContainer"></div>
    <div class="instagram-tag" id="instaDiv">
       <span>made in</span>
       <div class="insta-icon">
         <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
       </div>
       <span style="font-weight: bold;">ll_syko_sagar__111_ll</span>
    </div>
  </div>
</div>

<div class="main-wrapper">
    <div class="video-grid">
        <div class="info-tag">Online: <span id="count">1</span> | <span id="status">ಸಿದ್ಧವಾಗುತ್ತಿದೆ...</span></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div id="emojiPanel">
            <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">❤️</span><span class="emoji-item">👍</span><span class="emoji-item">😱</span><span class="emoji-item">👑</span>
        </div>
        <div class="side-controls">
            <button class="control-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="control-btn" id="vidBtn" onclick="toggleVid()">🎥</button>
            <button class="control-btn" onclick="flipCamera()">🔄</button>
            <button class="control-btn" onclick="applyFilter()" title="Apply 20 Filters">🪄</button>
            <button class="control-btn" onclick="toggleEmoji()">😊</button>
        </div>
        <div id="chatBox"></div>
    </div>
    <div class="action-bar">
        <button class="next-btn" onclick="findMatch()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="control-btn" style="width:auto; padding:0 15px; border-radius:20px;" onclick="sendChat()">SEND</button>
    </div>
</div>

<script>
// --- ಫೈರ್‌ಬೇಸ್ ಕಾನ್ಫಿಗರೇಶನ್ ---
const firebaseConfig = { databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- ಹೊಸ ಸಿನಿಮ್ಯಾಟಿಕ್ ಎಂಟ್ರಿ ಲಾಜಿಕ್ ---
const entryContainer = document.getElementById('logoContainer');
const text = "SYKOLIVE";
const entryColors = ["#ff4e00", "#00d4ff", "#9d00ff", "#ffee00", "#00ff62", "#ff0055"];

text.split("").forEach((char, i) => {
    const span = document.createElement('span');
    span.innerText = char;
    span.className = 'letter';
    span.style.color = entryColors[i % entryColors.length];
    const randomX = (Math.random() - 0.5) * 1200;
    const randomY = (Math.random() - 0.5) * 1200;
    span.animate([
      { opacity: 0, transform: `translate(${randomX}px, ${randomY}px) scale(0) rotate(-180deg)`, filter: 'blur(30px)' },
      { opacity: 1, transform: 'translate(0, 0) scale(1) rotate(0deg)', filter: 'blur(0)' }
    ], { duration: 1800, delay: i * 150, fill: 'forwards', easing: 'cubic-bezier(0.19, 1, 0.22, 1)' });
    entryContainer.appendChild(span);
});

setTimeout(() => {
    const insta = document.getElementById('instaDiv');
    insta.style.transition = "all 1.5s ease";
    insta.style.opacity = "1";
    insta.style.transform = "translateY(0)";
}, 2500);

const entryCanvas = document.getElementById('fxCanvas');
const eCtx = entryCanvas.getContext('2d');
entryCanvas.width = window.innerWidth;
entryCanvas.height = window.innerHeight;

let entryParticles = [];
let fireball = { x: entryCanvas.width / 2, y: entryCanvas.height + 50, active: true, speed: 10 };

function createFireExplosion(x, y) {
    for(let i=0; i<250; i++) {
      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 12 + 2;
      entryParticles.push({
        x: x, y: y,
        vx: Math.cos(angle) * velocity,
        vy: Math.sin(angle) * velocity,
        size: Math.random() * 5 + 1,
        color: i % 4 === 0 ? '#ff4e00' : (i % 4 === 1 ? '#ffcc00' : (i % 4 === 2 ? '#ffffff' : '#00d4ff')),
        life: 1.5,
        gravity: 0.08
      });
    }
}

function animateEntry() {
    eCtx.clearRect(0, 0, entryCanvas.width, entryCanvas.height);
    if(fireball.active) {
      eCtx.shadowBlur = 50; eCtx.shadowColor = "#ff4e00"; eCtx.fillStyle = "#ff4e00";
      eCtx.beginPath(); eCtx.arc(fireball.x, fireball.y, 14, 0, Math.PI*2); eCtx.fill();
      fireball.y -= fireball.speed;
      if(fireball.y <= entryCanvas.height / 2) {
        fireball.active = false;
        createFireExplosion(fireball.x, fireball.y);
        document.querySelectorAll('.letter').forEach(l => {
          l.style.transition = "all 0.8s ease";
          l.style.color = "#fff";
          l.style.textShadow = "0 0 30px #ff4e00, 0 0 60px #ffcc00";
        });
      }
    }
    entryParticles.forEach((p, i) => {
      p.vx *= 0.99; p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.life -= 0.008;
      eCtx.globalAlpha = p.life; eCtx.fillStyle = p.color; eCtx.shadowBlur = 15; eCtx.shadowColor = p.color;
      eCtx.beginPath(); eCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); eCtx.fill();
      if(p.life <= 0) entryParticles.splice(i, 1);
    });
    if(document.getElementById('power-sequence-entry')) requestAnimationFrame(animateEntry);
}

setTimeout(() => { animateEntry(); }, 4500);

setTimeout(() => {
    const entryDiv = document.getElementById('power-sequence-entry');
    entryDiv.style.transition = "opacity 2s ease";
    entryDiv.style.opacity = "0";
    setTimeout(() => entryDiv.remove(), 2000);
}, 10000);

// --- ವೀಡಿಯೊ ಚಾಟ್ ಲಾಜಿಕ್ ---
let peer, localStream, myID, currentCall, conn, currentFacing = "user", lastStranger = null;
let filterIndex = 0;
const filters = ["none", "grayscale(100%)", "sepia(100%)", "invert(100%)", "hue-rotate(90deg)", "hue-rotate(180deg)", "hue-rotate(270deg)", "brightness(1.5)", "brightness(0.5)", "contrast(200%)", "blur(5px)", "saturate(300%)", "saturate(0%)", "sepia(50%) brightness(1.2) contrast(1.2)", "grayscale(50%) contrast(1.5)", "hue-rotate(45deg) saturate(200%)", "drop-shadow(8px 8px 10px gray)", "opacity(70%)", "contrast(150%) brightness(1.1)", "brightness(1.2) hue-rotate(-30deg)"];

async function init() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        setupVoiceDetection(localStream, "localVideo");
        setupPeer();
    } catch (e) { alert("ಕ್ಯಾಮೆರಾ ಅನುಮತಿ ನೀಡಿ!"); }
}

function setupPeer() {
    peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });
    peer.on('open', id => {
        myID = id;
        db.ref("online_users/" + id).set({ status: "waiting" });
        db.ref("online_users/" + id).onDisconnect().remove();
        findMatch();
    });
    peer.on('call', call => { call.answer(localStream); setupCall(call); });
    peer.on('connection', c => { conn = c; conn.on('data', data => handleIncomingData(data)); });
}

function findMatch() {
    document.getElementById("status").innerText = "ಹುಡುಕಲಾಗುತ್ತಿದೆ...";
    if(currentCall) currentCall.close();
    db.ref("online_users/" + myID).update({ status: "waiting" });
    db.ref("online_users").once("value", snapshot => {
        let others = [];
        snapshot.forEach(child => { if (child.key !== myID && child.val().status === "waiting") others.push(child.key); });
        let selectedUser = others.find(id => id !== lastStranger) || others[0];
        if (selectedUser) {
            lastStranger = selectedUser;
            db.ref("online_users/" + myID).update({ status: "busy" });
            db.ref("online_users/" + selectedUser).update({ status: "busy" });
            conn = peer.connect(selectedUser);
            setupCall(peer.call(selectedUser, localStream));
        }
    });
}

function setupCall(call) {
    currentCall = call;
    call.on('stream', rs => {
        const rv = document.getElementById("remoteVideo");
        rv.srcObject = rs;
        setupVoiceDetection(rs, "remoteVideo");
        document.getElementById("status").innerText = "Connected!";
    });
}

function setupVoiceDetection(stream, elementId) {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    function check() {
        analyser.getByteFrequencyData(dataArray);
        let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
        const vid = document.getElementById(elementId);
        if(vid) vid.classList.toggle("voice-glowing", avg > 30);
        requestAnimationFrame(check);
    }
    check();
}

function applyFilter() {
    filterIndex = (filterIndex + 1) % filters.length;
    document.getElementById("localVideo").style.filter = filters[filterIndex];
}

async function flipCamera() {
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    localStream.getTracks().forEach(track => track.stop());
    localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
    document.getElementById("localVideo").srcObject = localStream;
    if (currentCall && currentCall.peerConnection) {
        const videoSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(videoSender) videoSender.replaceTrack(localStream.getVideoTracks()[0]);
    }
}

function toggleMic() {
    const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("micBtn").innerText = t.enabled ? "🎤" : "🔇";
    document.getElementById("micBtn").classList.toggle("off", !t.enabled);
}
function toggleVid() {
    const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("vidBtn").innerText = t.enabled ? "🎥" : "🚫";
    document.getElementById("vidBtn").classList.toggle("off", !t.enabled);
}

function toggleEmoji() {
    const p = document.getElementById("emojiPanel");
    p.style.display = p.style.display === "flex" ? "none" : "flex";
}

document.querySelectorAll(".emoji-item").forEach(el => {
    el.onclick = () => {
        showRain(el.innerText);
        if(conn) conn.send({ type: 'emoji', val: el.innerText });
    };
});

function showRain(emoji) {
    for(let i=0; i<30; i++) {
        setTimeout(() => {
            let s = document.createElement("span");
            s.className = "emoji-rain"; s.innerText = emoji;
            s.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 2500);
        }, i * 80);
    }
}

function sendChat() {
    const val = document.getElementById("chatInput").value;
    if(val && conn) {
        conn.send({ type: 'chat', msg: val });
        addChat("You", val);
        document.getElementById("chatInput").value = "";
    }
}

function handleIncomingData(data) {
    if(data.type === 'chat') addChat("Stranger", data.msg);
    if(data.type === 'emoji') showRain(data.val);
}

function addChat(user, msg) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "msg-item";
    div.innerHTML = `<b>${user}:</b> ${msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

db.ref("online_users").on("value", s => document.getElementById("count").innerText = s.numChildren() || 1);
init();
</script>
</body>
</html>
