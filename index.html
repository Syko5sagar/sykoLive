<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Pro</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:#000; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color:white; overflow:hidden; height: 100vh; }

/* ಸಾಗರ್, ಇಲ್ಲಿ ಎಂಟ್ರಿ ಅನಿಮೇಷನ್ ಡಿಸೈನ್ ಇದೆ */
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:999; }
.logo-container { display: flex; gap: 10px; }
.letter {
    font-size: 50px; font-weight: 900; color: #ff0055;
    text-shadow: 0 0 20px #ff0055; opacity: 0;
    transform: translateY(20px);
    animation: reveal 0.4s forwards;
}
@keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
}

.main{ display:flex; flex-direction:column; height:100vh; }
.video-section{ flex:1; position:relative; display:flex; background:#111; }
video{ width:100%; height:100%; object-fit:cover; background:#000; }

/* ಲೋಕಲ್ ವೀಡಿಯೊ ಡಿಸೈನ್ */
#localVideo{ position:absolute; bottom:20px; right:20px; width:120px; height:160px; border:2px solid #ff0055; border-radius:15px; z-index: 10; object-fit: cover; box-shadow: 0 0 15px rgba(255,0,85,0.5); }

/* ಆಕ್ಷನ್ ಬಟನ್ ಗಳು */
.controls{ position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:20px; z-index: 5; }
.btn{ width:60px; height:60px; border-radius:50%; border:none; background:rgba(255,255,255,0.15); color:white; font-size:22px; cursor:pointer; backdrop-filter: blur(10px); transition: 0.3s; }
.btn:active { transform: scale(0.9); background: #ff0055; }

/* ಚಾಟ್ ಮತ್ತು ಬಾಟಮ್ ಸೆಕ್ಷನ್ */
.bottom{ background:#111; padding:15px; display:flex; gap:10px; align-items: center; border-top: 1px solid #333; }
.next{ background:#ff0055; border:none; padding:12px 25px; border-radius:30px; color:white; font-weight: bold; cursor:pointer; font-size: 16px; }
input{ flex:1; padding:12px 20px; border:none; border-radius:30px; background:#222; color:white; outline: none; font-size: 16px; }
.chatBox{ position:absolute; top:80px; right:20px; width:240px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:15px; font-size:14px; pointer-events: none; z-index: 5; border: 1px solid rgba(255,255,255,0.1); }
.online{ position:absolute; top:25px; left:20px; background:rgba(255, 0, 85, 0.9); padding:8px 18px; border-radius:30px; font-size:13px; font-weight:bold; z-index: 5; box-shadow: 0 0 10px #ff0055; }
</style>
</head>

<body>
<div id="entry">
    <div class="logo-container" id="logoText"></div>
</div>

<div class="main">
    <div class="video-section">
        <div class="online">● LIVE: <span id="onlineCount">0</span></div>
        <div id="chatBox" class="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn" title="Mute" onclick="toggleAudio()">🎤</button>
            <button class="btn" title="Camera" onclick="toggleVideo()">🎥</button>
            <button class="btn" title="Flip" onclick="flipCamera()">🔄</button>
        </div>
    </div>
    <div class="bottom">
        <button class="next" onclick="findStranger()">NEXT</button>
        <input id="chatInput" placeholder="Say something...">
        <button class="next" style="background:#444;" onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
const firebaseConfig={ databaseURL:"https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const lobby=db.ref("lobby");
const online=db.ref("online");

// ಲೋಗೋ ಸ್ಪೆಲ್ಲಿಂಗ್ ಅನಿಮೇಷನ್ ಲಾಜಿಕ್
const text = "SYKOLIVE";
const container = document.getElementById("logoText");
text.split("").forEach((char, i) => {
    const span = document.createElement("span");
    span.innerText = char;
    span.className = "letter";
    span.style.animationDelay = `${i * 0.15}s`;
    container.appendChild(span);
});

// 3 ಸೆಕೆಂಡ್ ನಂತರ ಆಟೋಮ್ಯಾಟಿಕ್ ಎಂಟ್ರಿ
setTimeout(() => {
    document.getElementById("entry").style.opacity = "0";
    setTimeout(() => {
        document.getElementById("entry").style.display = "none";
        startApp();
    }, 500);
}, 3500);

online.on("value",snap=>{ document.getElementById("onlineCount").innerText=snap.numChildren() });

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp(){
    await startCamera();
    peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });
    peer.on("open",id=>{
        myId=id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });
    peer.on("call", call => { 
        currentCall = call; 
        call.answer(myStream); 
        call.on("stream", s => { document.getElementById("remoteVideo").srcObject = s; });
    });
    peer.on("connection", c => { conn = c; setupChat(); });
}

async function startCamera(){
    try{
        myStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: facing, width: 640, height: 480 }, audio: true 
        });
        document.getElementById("localVideo").srcObject = myStream;
    } catch(e) { console.log("Camera error"); }
}

function findStranger(){
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;
    lobby.off(); 
    lobby.once("value", snap => {
        let targetId = null;
        let targetKey = null;
        snap.forEach(child => { if(child.val() !== myId){ targetId = child.val(); targetKey = child.key; return true; } });
        if(targetId){
            lobby.child(targetKey).remove().then(() => connectToStranger(targetId));
        } else {
            const myRef = lobby.push(myId);
            myRef.onDisconnect().remove();
            lobby.on("child_added", s => { if(s.val() !== myId){ lobby.off(); findStranger(); } });
        }
    });
}

function connectToStranger(id){
    setTimeout(() => {
        conn = peer.connect(id);
        setupChat();
        currentCall = peer.call(id, myStream);
        currentCall.on("stream", s => { document.getElementById("remoteVideo").srcObject = s; });
    }, 100); 
}

function setupChat(){ if(!conn) return; conn.on("data", msg => { addChat("Stranger: " + msg); }); }

function sendMsg(){
    let input = document.getElementById("chatInput");
    if(!input.value || !conn) return;
    addChat("You: " + input.value);
    conn.send(input.value);
    input.value = "";
}

function addChat(t){
    let chatBox = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.style.marginBottom = "8px";
    div.innerText = t;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function toggleAudio(){ myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; }
function toggleVideo(){ myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; }

async function flipCamera(){ 
    facing = (facing === "user") ? "environment" : "user"; 
    myStream.getTracks().forEach(track => track.stop());
    await startCamera();
    if(currentCall && currentCall.peerConnection){
        const videoTrack = myStream.getVideoTracks()[0];
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
}
</script>
</body>
</html>
