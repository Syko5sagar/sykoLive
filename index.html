<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syko Live - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { color: #fff; margin-bottom: 20px; letter-spacing: 2px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
        }
        input::placeholder { color: #ddd; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ff0057;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #ff4081; transform: translateY(-2px); }
        #recaptcha-container { margin-top: 15px; }
        .hidden { display: none; }
        #status { color: #00ff88; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>SYKO LIVE</h2>
    
    <div id="phone-section">
        <input type="text" id="phone" placeholder="+91 9876543210">
        <div id="recaptcha-container"></div>
        <button onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="otp-section" class="hidden">
        <input type="text" id="otp" placeholder="Enter 6-digit OTP">
        <button onclick="verifyOTP()">Verify & Login</button>
    </div>

    <p id="status"></p>
</div>

<script>
    // ನಿಮ್ಮ Firebase ಕಾನ್ಫಿಗರೇಶನ್
    const firebaseConfig = {
        apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
        authDomain: "sykolive-846a3.firebaseapp.com",
        databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com",
        projectId: "sykolive-846a3"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Recaptcha ಸೆಟಪ್
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
    });

    let confirmationResult;

    // 1. ಓಟಿಪಿ ಕಳುಹಿಸುವ ಫಂಕ್ಷನ್
    function sendOTP() {
        const phoneNumber = document.getElementById('phone').value;
        const appVerifier = window.recaptchaVerifier;

        auth.signInWithPhoneNumber(phoneNumber, appVerifier)
            .then((result) => {
                confirmationResult = result;
                document.getElementById('phone-section').classList.add('hidden');
                document.getElementById('otp-section').classList.remove('hidden');
                document.getElementById('status').innerText = "OTP ಕಳುಹಿಸಲಾಗಿದೆ!";
            }).catch((error) => {
                alert("Error: " + error.message);
            });
    }

    // 2. ಓಟಿಪಿ ವೆರಿಫೈ ಮಾಡುವ ಫಂಕ್ಷನ್
    function verifyOTP() {
        const code = document.getElementById('otp').value;
        confirmationResult.confirm(code).then((result) => {
            const user = result.user;
            document.getElementById('status').innerText = "ಲಾಗಿನ್ ಯಶಸ್ವಿಯಾಗಿದೆ!";
            // ಇಲ್ಲಿ ನೀವು ಬೇರೆ ಪೇಜ್‌ಗೆ ರೀಡೈರೆಕ್ಟ್ ಮಾಡಬಹುದು
            // window.location.href = "dashboard.html";
        }).catch((error) => {
            alert("ತಪ್ಪು ಓಟಿಪಿ! ದಯವಿಟ್ಟು ಸರಿಯಾದ ಸಂಖ್ಯೆ ಹಾಕಿ.");
        });
    }
</script>

</body>
</html>
