<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Syko Live Pro V3</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
/* ಮೂಲ ವಿನ್ಯಾಸ - 100dvh ಬಳಸಲಾಗಿದೆ ಇದರಿಂದ ಮೊಬೈಲ್ ನಲ್ಲಿ ಕಟ್ ಆಗಲ್ಲ */
body, html { margin:0; padding:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; width: 100%; position: fixed; }

/* ಎಂಟ್ರಿ ಅನಿಮೇಷನ್ */
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; }
.letter { font-size: 40px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px #ff0055; opacity: 0; animation: bounceIn 0.5s forwards; }
@keyframes bounceIn { to { opacity: 1; transform: scale(1); } }

/* ಮೇನ್ ಕಂಟೇನರ್ */
.main-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100vw; position: relative; }

/* ವಿಡಿಯೋ ಸೆಕ್ಷನ್ */
.video-grid { flex: 1; position: relative; display: flex; background: #111; overflow: hidden; justify-content: center; align-items: center; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }

/* ಲೋಕಲ್ ವಿಡಿಯೋ - ಮೊಬೈಲ್ ನಲ್ಲಿ ಸ್ವಲ್ಪ ಮೇಲೆ ಜರಿಸಲಾಗಿದೆ */
#localVideo { 
    position: absolute; 
    bottom: 20px; 
    right: 15px; 
    width: 100px; 
    height: 140px; 
    border: 2px solid #55eefc; 
    border-radius: 12px; 
    z-index: 10; 
    object-fit: cover; 
    background: #222; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

/* ಕಂಟ್ರೋಲ್ ಬಟನ್ ಗಳು */
.side-controls { position: absolute; left: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 20; }
.control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.15); color: white; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
.control-btn.off { background: rgba(255, 0, 0, 0.6); }

/* ಚಾಟ್ ಬಾಕ್ಸ್ - ಮೊಬೈಲ್ ನಲ್ಲಿ ಇನ್‌ಪುಟ್ ಬಾರ್‌ನ ಮೇಲ್ಭಾಗಕ್ಕೆ ಹೊಂದಿಸಲಾಗಿದೆ */
#chatBox { 
    position: absolute; 
    bottom: 10px; 
    left: 15px; 
    width: 65%; 
    max-height: 120px; 
    overflow-y: auto; 
    background: rgba(0,0,0,0.3); 
    padding: 8px; 
    border-radius: 10px; 
    font-size: 13px; 
    z-index: 5; 
    pointer-events: none; 
    scroll-behavior: smooth;
}
.msg-tag { font-weight: bold; color: #55eefc; }

/* ಕೆಳಗಿನ ಪಟ್ಟಿ (Input & Next) - ಮೊಬೈಲ್ ಬ್ರೌಸರ್ ಹ್ಯಾಂಡಲ್ ಗೆ ಜಾಗ ಬಿಡಲಾಗಿದೆ */
.action-bar { 
    height: 70px; 
    background: #000; 
    border-top: 1px solid #222; 
    display: flex; 
    align-items: center; 
    padding: 0 10px; 
    gap: 8px; 
    z-index: 30;
    padding-bottom: env(safe-area-inset-bottom);
}
.next-btn { background: #ff0055; border: none; padding: 10px 18px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
input { flex: 1; background: #222; border: none; padding: 10px 15px; border-radius: 20px; color: white; outline: none; font-size: 14px; }
.send-btn { background: #333; border: none; padding: 10px 15px; border-radius: 20px; color: white; cursor: pointer; font-size: 13px; }

/* ಸ್ಟೇಟಸ್ ಟ್ಯಾಗ್ */
.info-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; font-size: 11px; z-index: 100; border: 1px solid rgba(255,0,85,0.5); }

/* ಕಂಪ್ಯೂಟರ್ ಗಾಗಿ ವಿನ್ಯಾಸ (Desktop) */
@media (min-width: 768px) {
    #localVideo { width: 180px; height: 135px; bottom: 25px; right: 25px; }
    #chatBox { width: 350px; bottom: 20px; }
    .side-controls { left: 25px; }
    .action-bar { padding: 0 25px; gap: 15px; }
}
</style>
</head>

<body>
<div id="entry">
    <div id="logoText"></div>
</div>

<div class="main-wrapper">
    <div class="video-grid">
        <div class="info-tag">Online: <span id="onlineCount">0</span> | <span id="status">ಸಿದ್ಧವಾಗುತ್ತಿದೆ...</span></div>
        <div id="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div class="side-controls">
            <button class="control-btn" id="micBtn" onclick="toggleAudio()">🎤</button>
            <button class="control-btn" id="vidBtn" onclick="toggleVideo()">🎥</button>
            <button class="control-btn" onclick="flipCamera()">🔄</button>
        </div>
    </div>

    <div class="action-bar">
        <button class="next-btn" onclick="findStranger()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="send-btn" onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
// --- ನಿನ್ನ Firebase Config ಇಲ್ಲಿ ಹಾಕು ---
const firebaseConfig = {
  apiKey: "YOUR_API_KEY", 
  authDomain: "sykolive-846a3.firebaseapp.com",
  databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/",
  projectId: "sykolive-846a3",
  storageBucket: "sykolive-846a3.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const lobby = db.ref("lobby");
const online = db.ref("online");

// ಎಂಟ್ರಿ ಅನಿಮೇಷನ್
const logoContainer = document.getElementById("logoText");
"SYKOLIVE".split("").forEach((c, i) => {
    const span = document.createElement("span");
    span.innerText = c; span.className = "letter";
    span.style.animationDelay = `${i * 0.1}s`;
    logoContainer.appendChild(span);
});
setTimeout(() => { document.getElementById("entry").style.display = "none"; startApp(); }, 3000);

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp() {
    try {
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: true });
        document.getElementById("localVideo").srcObject = myStream;
        setupPeer();
    } catch(e) { alert("ಕ್ಯಾಮೆರಾ ಅನುಮತಿ ನೀಡಿ!"); }
}

function setupPeer() {
    peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } });
    
    peer.on("open", id => {
        myId = id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });

    peer.on("call", call => {
        currentCall = call;
        call.answer(myStream);
        call.on("stream", s => { document.getElementById("remoteVideo").srcObject = s; });
    });

    peer.on("connection", c => {
        conn = c;
        conn.on("data", data => addChat("Stranger", data));
        document.getElementById("status").innerText = "Connected!";
    });

    online.on("value", s => { document.getElementById("onlineCount").innerText = s.numChildren(); });
}

function findStranger() {
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("status").innerText = "ಹುಡುಕಲಾಗುತ್ತಿದೆ...";
    document.getElementById("chatBox").innerHTML = "";

    lobby.once("value", snap => {
        let targetId = null;
        snap.forEach(child => { if(child.val() !== myId) targetId = child.val(); });

        if(targetId) {
            lobby.child(targetId).remove();
            connectTo(targetId);
        } else {
            lobby.child(myId).set(myId);
            lobby.child(myId).onDisconnect().remove();
            lobby.on("child_removed", s => { if(s.key !== myId) findStranger(); });
        }
    });
}

function connectTo(id) {
    conn = peer.connect(id);
    conn.on("open", () => {
        document.getElementById("status").innerText = "Connected!";
        conn.on("data", data => addChat("Stranger", data));
    });
    currentCall = peer.call(id, myStream);
    currentCall.on("stream", s => { document.getElementById("remoteVideo").srcObject = s; });
}

function sendMsg() {
    const val = document.getElementById("chatInput").value;
    if(val && conn) {
        conn.send(val);
        addChat("You", val);
        document.getElementById("chatInput").value = "";
    }
}

function addChat(user, msg) {
    const box = document.getElementById("chatBox");
    box.innerHTML += `<div><span class="msg-tag">${user}:</span> ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

function toggleAudio() {
    const audio = myStream.getAudioTracks()[0];
    audio.enabled = !audio.enabled;
    document.getElementById("micBtn").classList.toggle("off", !audio.enabled);
}

function toggleVideo() {
    const video = myStream.getVideoTracks()[0];
    video.enabled = !video.enabled;
    document.getElementById("vidBtn").classList.toggle("off", !video.enabled);
}

async function flipCamera() {
    facing = facing === "user" ? "environment" : "user";
    myStream.getTracks().forEach(t => t.stop());
    myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: true });
    document.getElementById("localVideo").srcObject = myStream;
    if(currentCall) {
        const videoTrack = myStream.getVideoTracks()[0];
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
}

document.getElementById("chatInput").onkeypress = (e) => { if(e.key === "Enter") sendMsg(); };
</script>
</body>
</html>
