<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Syko Live PRO - Magic Pen</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body { margin:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; }
#entry { position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; font-size:40px; color:#ff0055; z-index:999; }
.main { display:flex; flex-direction:column; height:100vh; }
.video-area { flex:1; position:relative; background:#111; overflow:hidden; }

/* Magic Canvas - ಬರೆಯುವ ಜಾಗ */
#magicCanvas {
    position: absolute; top:0; left:0; width:100%; height:100%;
    z-index: 80; pointer-events: none; /* ಆರಂಭದಲ್ಲಿ ಬರೆಯಲು ಬರುವುದಿಲ್ಲ */
}

#remoteVideo { width:100%; height:100%; object-fit:cover; }
#localVideo { position:absolute; bottom:20px; right:15px; width:100px; height:140px; border-radius:10px; border:2px solid #55eefc; object-fit:cover; z-index:90; }

.controls { position:absolute; left:10px; top:40%; display:flex; flex-direction:column; gap:12px; z-index:100; }
.controls button { width:45px; height:45px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:white; font-size:18px; cursor:pointer; }
.controls button.active { background: #ff0055; }

.chatbox { position:absolute; bottom:10px; left:10px; width:60%; max-height:120px; overflow:auto; background:rgba(0,0,0,0.4); padding:8px; border-radius:10px; font-size:13px; z-index:100; }
.action { height:70px; background:#000; display:flex; gap:6px; align-items:center; padding:10px; border-top:1px solid #222; }
input { flex:1; padding:8px; border-radius:20px; border:none; background:#222; color:white; }
button.next { background:#ff0055; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer; }

.voice-glow { box-shadow: inset 0 0 50px #ff0055; transition: 0.1s; }
</style>
</head>

<body>

<div id="entry">SYKO LIVE</div>

<div class="main">
    <div class="video-area" id="videoArea">
        <canvas id="magicCanvas"></canvas>
        
        <div id="chatBox" class="chatbox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div class="controls">
            <button id="micBtn">🎤</button>
            <button id="drawBtn" title="Magic Pen">✏️</button>
            <button id="clearBtn" title="Clear All">🗑️</button>
            <button id="flipBtn">🔄</button>
        </div>
    </div>

    <div class="action">
        <button class="next" id="nextBtn">NEXT</button>
        <input id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button id="sendBtn" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:20px;">SEND</button>
    </div>
</div>

<script>
// --- Firebase Config (ನಿಮ್ಮ ಅಸಲಿ ಕೀ ಇಲ್ಲಿದೆ) ---
const firebaseConfig = {
    apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
    authDomain: "sykolive-846a3.firebaseapp.com",
    databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com",
    projectId: "sykolive-846a3",
    storageBucket: "sykolive-846a3.firebasestorage.app",
    messagingSenderId: "785797986997",
    appId: "1:785797986997:web:70c8263e3f712758bdbcfc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const lobby = db.ref("lobby");

// Canvas Setup
const canvas = document.getElementById('magicCanvas');
const ctx = canvas.getContext('2d');
let drawingMode = false;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resizeCanvas;
resizeCanvas();

// ಬರೆಯುವ ಕೆಲಸ (Drawing Logic)
function drawPoint(x, y, color = "#ff0055", isRemote = false) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    
    // ಎದುರಿಗಿದ್ದವರಿಗೆ ಕಳುಹಿಸುವುದು
    if(!isRemote && conn) {
        conn.send({ type: 'draw', x: x / canvas.width, y: y / canvas.height });
    }
}

canvas.onmousemove = (e) => {
    if(e.buttons === 1 && drawingMode) drawPoint(e.clientX, e.clientY);
};

canvas.ontouchmove = (e) => {
    if(drawingMode) {
        let touch = e.touches[0];
        drawPoint(touch.clientX, touch.clientY);
    }
};

document.getElementById('drawBtn').onclick = () => {
    drawingMode = !drawingMode;
    canvas.style.pointerEvents = drawingMode ? "auto" : "none";
    document.getElementById('drawBtn').classList.toggle('active', drawingMode);
};

document.getElementById('clearBtn').onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if(conn) conn.send({ type: 'clear' });
};

// --- PEER & VIDEO LOGIC ---
let peer, myId, myStream, conn, currentCall;

async function start() {
    myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = myStream;
    
    peer = new Peer();
    peer.on('open', id => { myId = id; findStranger(); });
    
    peer.on('call', call => {
        currentCall = call;
        call.answer(myStream);
        call.on('stream', s => { document.getElementById('remoteVideo').srcObject = s; });
    });

    peer.on('connection', c => {
        conn = c;
        setupDataListener();
    });
}

function setupDataListener() {
    conn.on('data', d => {
        if(d.type === 'draw') {
            drawPoint(d.x * canvas.width, d.y * canvas.height, "#55eefc", true);
        } else if(d.type === 'clear') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        } else {
            addChat("Stranger", d);
        }
    });
}

function findStranger() {
    lobby.once("value", snap => {
        let users = [];
        snap.forEach(c => { if(c.key !== myId) users.push(c.key); });
        if(users.length > 0) {
            let target = users[Math.floor(Math.random() * users.length)];
            lobby.child(target).remove();
            connectTo(target);
        } else {
            lobby.child(myId).set(true);
        }
    });
}

function connectTo(id) {
    conn = peer.connect(id);
    setupDataListener();
    currentCall = peer.call(id, myStream);
    currentCall.on('stream', s => { document.getElementById('remoteVideo').srcObject = s; });
}

function addChat(user, msg) {
    const cb = document.getElementById('chatBox');
    cb.innerHTML += `<div><b>${user}:</b> ${msg}</div>`;
    cb.scrollTop = cb.scrollHeight;
}

// UI ಇವೆಂಟ್‌ಗಳು
document.getElementById('sendBtn').onclick = () => {
    let m = document.getElementById('chatInput').value;
    if(m && conn) { conn.send(m); addChat("You", m); document.getElementById('chatInput').value = ""; }
};

document.getElementById('nextBtn').onclick = () => location.reload();

setTimeout(() => { document.getElementById('entry').style.display='none'; start(); }, 2000);
</script>
</body>
</html>
