<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verify - Sagar Syko</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #121212; color: white; font-family: Arial; }
        canvas { position: absolute; }
        #video-container { position: relative; margin-top: 20px; }
        video { border-radius: 10px; background: #333; }
        .status { margin-top: 10px; font-size: 18px; color: #00ff00; }
    </style>
</head>
<body>

    <h2>Face Verification</h2>
    <div id="video-container">
        <video id="video" width="400" height="300" autoplay muted></video>
    </div>
    <div class="status" id="status">ಮಾಡೆಲ್‌ಗಳು ಲೋಡ್ ಆಗುತ್ತಿವೆ, ದಯವಿಟ್ಟು ಕಾಯಿರಿ...</div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        // 1. ಮಾಡೆಲ್‌ಗಳನ್ನು ಲೋಡ್ ಮಾಡುವುದು
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
            faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'),
            faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights')
        ]).then(startVideo);

        // 2. ಕ್ಯಾಮೆರಾ ಆನ್ ಮಾಡುವುದು
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    statusText.innerText = "ಕ್ಯಾಮೆರಾ ಸಿದ್ಧವಾಗಿದೆ. ಮುಖ ತೋರಿಸಿ.";
                })
                .catch(err => console.error("ಕ್ಯಾಮೆರಾ ದೋಷ:", err));
        }

        // 3. ಮುಖ ಪತ್ತೆಹಚ್ಚುವುದು
        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('video-container').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);
                
                if (detections.length > 0) {
                    statusText.innerText = "ಮುಖ ಪತ್ತೆಯಾಗಿದೆ!";
                } else {
                    statusText.innerText = "ಮುಖ ಕಾಣಿಸುತ್ತಿಲ್ಲ...";
                }
            }, 100);
        });
    </script>
</body>
</html>
