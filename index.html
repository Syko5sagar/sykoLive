<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Syko Live Pro V3 - Global Random Connect</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
:root { --primary: #ff0055; --secondary: #55eefc; }
body, html { margin:0; padding:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; width: 100%; position: fixed; }

/* --- 1. ಅಟ್ರಾಕ್ಟಿವ್ ಗ್ಲೋಯಿಂಗ್ ಎಂಟ್ರಿ ಲೋಗೋ --- */
#entry { position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; flex-direction: column; }
#logoText { display: flex; gap: 8px; }
.letter { 
    font-size: 55px; font-weight: bold; color: #fff; 
    text-shadow: 0 0 10px #fff, 0 0 20px var(--primary), 0 0 40px var(--primary); 
    opacity: 0; transform: scale(0.5); 
    animation: glowIn 0.8s forwards; 
}
@keyframes glowIn { 
    to { opacity: 1; transform: scale(1); text-shadow: 0 0 20px #fff, 0 0 40px var(--primary), 0 0 60px var(--primary); } 
}
#entry::after {
    content: ''; position: absolute; width: 250px; height: 250px; background: var(--primary); 
    border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { transform: scale(1); opacity:0.3; } 50% { transform: scale(1.3); opacity:0.5; } }

/* --- 2. ವಾಯ್ಸ್ ಬಾರ್ಡರ್ ಲೈಟಿಂಗ್ --- */
.voice-glowing { 
    box-shadow: inset 0 0 20px var(--secondary), 0 0 30px var(--secondary) !important; 
    border: 3px solid var(--secondary) !important; 
    transition: 0.1s; 
}

.video-grid { position: relative; width: 100%; height: calc(100dvh - 75px); background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; transition: 0.2s; border: 2px solid transparent; }
#localVideo { position: absolute; bottom: 20px; right: 15px; width: 110px; height: 150px; border: 2px solid var(--primary); border-radius: 12px; z-index: 10; object-fit: cover; background: #222; }

#magicCanvas { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }

.side-controls { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 20; }
.control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.15); color: white; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
.control-btn.active { background: var(--secondary); color: #000; }
.control-btn.off { background: rgba(255, 0, 0, 0.6); }

#chatBox { position: absolute; bottom: 10px; left: 15px; width: 65%; max-height: 150px; overflow-y: auto; z-index: 5; pointer-events: none; }
.msg-item { background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; pointer-events: auto; border-left: 3px solid var(--primary); }

.action-bar { height: 75px; background: #000; display: flex; align-items: center; padding: 0 10px; gap: 8px; border-top: 1px solid #222; }
.next-btn { background: var(--primary); border: none; padding: 12px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; flex-shrink: 0; }
input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }

/* --- 3. ಅಟ್ರಾಕ್ಟಿವ್ ಎಮೋಜಿ ರೈನ್ --- */
#emojiPanel { position: absolute; left: 70px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.85); padding: 12px; border-radius: 15px; display: none; flex-direction: column; gap: 12px; z-index: 25; border: 1px solid #333; }
.emoji-item { font-size: 28px; cursor: pointer; transition: 0.2s; }
.emoji-item:hover { transform: scale(1.3); }
.emoji-rain { 
    position: fixed; top: -10dvh; font-size: 35px; z-index: 1000; 
    animation: rainFall 2.5s linear forwards; 
    pointer-events: none;
}
@keyframes rainFall { 
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110dvh) rotate(360deg); opacity: 0; }
}

.info-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 11px; z-index: 100; border: 1px solid var(--primary); }
</style>
</head>

<body>
<div id="entry"><div id="logoText"></div></div>

<div class="main-wrapper">
    <div class="video-grid" id="videoGrid">
        <div class="info-tag">Online: <span id="count">1</span> | <span id="status">ಸಿದ್ಧವಾಗುತ್ತಿದೆ...</span></div>
        
        <canvas id="magicCanvas"></canvas>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div id="emojiPanel">
            <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">❤️</span><span class="emoji-item">👍</span><span class="emoji-item">😱</span><span class="emoji-item">👑</span>
        </div>
        
        <div class="side-controls">
            <button class="control-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="control-btn" id="vidBtn" onclick="toggleVid()">🎥</button>
            <button class="control-btn" onclick="flipCamera()">🔄</button>
            <button class="control-btn" id="drawBtn" onclick="toggleDraw()">✏️</button>
            <button class="control-btn" onclick="clearCanvas()">🗑️</button>
            <button class="control-btn" onclick="toggleEmoji()">😊</button>
        </div>

        <div id="chatBox"></div>
    </div>

    <div class="action-bar">
        <button class="next-btn" onclick="findMatch()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="control-btn" style="width:auto; padding:0 15px; border-radius:20px;" onclick="sendChat()">SEND</button>
    </div>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = { databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ಎಂಟ್ರಿ ಆನಿಮೇಷನ್ ಲಾಜಿಕ್
const logoContainer = document.getElementById("logoText");
"SYKOLIVE".split("").forEach((c, i) => {
    const span = document.createElement("span");
    span.innerText = c; span.className = "letter";
    span.style.animationDelay = `${i * 0.1}s`;
    logoContainer.appendChild(span);
});
setTimeout(() => { document.getElementById("entry").style.opacity = "0"; setTimeout(()=>document.getElementById("entry").remove(), 500); }, 3500);

let peer, localStream, myID, currentCall, conn, isDrawing = false, currentFacing = "user";
let lastX = 0, lastY = 0;

async function init() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: currentFacing, width: { ideal: 640 }, height: { ideal: 480 } }, 
            audio: { echoCancellation: true, noiseSuppression: true } 
        });
        document.getElementById("localVideo").srcObject = localStream;
        setupVoiceDetection(localStream, "localVideo");
        setupPeer();
    } catch (e) { alert("ಕ್ಯಾಮೆರಾ ಮತ್ತು ಮೈಕ್ ಅನುಮತಿ ನೀಡಿ!"); }
}

function setupPeer() {
    peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });
    
    peer.on('open', id => {
        myID = id;
        db.ref("online_users/" + id).set({ status: "waiting" });
        db.ref("online_users/" + id).onDisconnect().remove();
        findMatch();
    });

    peer.on('call', call => {
        call.answer(localStream);
        setupCall(call);
    });

    peer.on('connection', c => {
        conn = c;
        conn.on('data', data => handleIncomingData(data));
    });
}

// --- 4. ರಾಂಡಮ್ ಕನೆಕ್ಷನ್ ಲಾಜಿಕ್ ---
function findMatch() {
    document.getElementById("status").innerText = "ಹುಡುಕಲಾಗುತ್ತಿದೆ...";
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    
    db.ref("online_users/" + myID).update({ status: "waiting" });

    db.ref("online_users").once("value", snapshot => {
        let availableUsers = [];
        snapshot.forEach(child => {
            if (child.key !== myID && child.val().status === "waiting") {
                availableUsers.push(child.key);
            }
        });

        if (availableUsers.length > 0) {
            const randomUser = availableUsers[Math.floor(Math.random() * availableUsers.length)];
            db.ref("online_users/" + myID).update({ status: "busy" });
            db.ref("online_users/" + randomUser).update({ status: "busy" });

            conn = peer.connect(randomUser);
            const call = peer.call(randomUser, localStream);
            setupCall(call);
        }
    });
}

function setupCall(call) {
    currentCall = call;
    call.on('stream', rs => {
        const remoteVid = document.getElementById("remoteVideo");
        remoteVid.srcObject = rs;
        setupVoiceDetection(rs, "remoteVideo");
        remoteVid.play().catch(e => console.log("Play error"));
        document.getElementById("status").innerText = "Connected!";
    });
}

// ವಾಯ್ಸ್ ಬಾರ್ಡರ್ ಡಿಟೆಕ್ಷನ್
function setupVoiceDetection(stream, elementId) {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function check() {
        analyser.getByteFrequencyData(dataArray);
        let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
        const vid = document.getElementById(elementId);
        if(avg > 30) vid.classList.add("voice-glowing");
        else vid.classList.remove("voice-glowing");
        requestAnimationFrame(check);
    }
    check();
}

// --- 5. ಅಟ್ರಾಕ್ಟಿವ್ ಎಮೋಜಿ ರೈನ್ ಅಪ್ಡೇಟ್ ---
function toggleEmoji() {
    const p = document.getElementById("emojiPanel");
    p.style.display = p.style.display === "flex" ? "none" : "flex";
}

document.querySelectorAll(".emoji-item").forEach(el => {
    el.onclick = () => {
        showRain(el.innerText);
        if(conn) conn.send({ type: 'emoji', val: el.innerText });
    };
});

function showRain(emoji) {
    // ಈಗ 40 ಎಮೋಜಿಗಳು ಒಟ್ಟಿಗೆ ಬೀಳುತ್ತವೆ (More Intense)
    for(let i=0; i<40; i++) {
        setTimeout(() => {
            let s = document.createElement("span");
            s.className = "emoji-rain"; s.innerText = emoji;
            s.style.left = Math.random() * 100 + "vw";
            s.style.fontSize = (Math.random() * 20 + 20) + "px"; // ರಾಂಡಮ್ ಸೈಜ್
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 2500);
        }, i * 50); // ಒಂದಾದ ಮೇಲೆ ಒಂದು ಸುರಿಯುವ ಎಫೆಕ್ಟ್
    }
}

// ಡ್ರಾಯಿಂಗ್ ಲೈನ್ ಫಿಕ್ಸ್
const canvas = document.getElementById("magicCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

function toggleDraw() {
    isDrawing = !isDrawing;
    canvas.style.pointerEvents = isDrawing ? "auto" : "none";
    document.getElementById("drawBtn").classList.toggle("active", isDrawing);
}
canvas.onpointerdown = e => { lastX = e.clientX; lastY = e.clientY; };
canvas.onpointermove = e => {
    if(isDrawing && e.buttons === 1) {
        drawLine(lastX, lastY, e.clientX, e.clientY, "#55eefc");
        if(conn) conn.send({ type: 'draw', x1: lastX, y1: lastY, x2: e.clientX, y2: e.clientY });
        lastX = e.clientX; lastY = e.clientY;
    }
};
function drawLine(x1, y1, x2, y2, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}
function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }

// ಇತರ ಕಂಟ್ರೋಲ್‌ಗಳು
async function flipCamera() {
    currentFacing = currentFacing === "user" ? "environment" : "user";
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
    const videoTrack = newStream.getVideoTracks()[0];
    if(currentCall) {
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
    localStream.getVideoTracks()[0].stop();
    localStream.removeTrack(localStream.getVideoTracks()[0]);
    localStream.addTrack(videoTrack);
    document.getElementById("localVideo").srcObject = localStream;
}

function toggleMic() {
    const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("micBtn").innerText = t.enabled ? "🎤" : "🔇";
    document.getElementById("micBtn").classList.toggle("off", !t.enabled);
}
function toggleVid() {
    const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("vidBtn").innerText = t.enabled ? "🎥" : "🚫";
    document.getElementById("vidBtn").classList.toggle("off", !t.enabled);
}

function sendChat() {
    const val = document.getElementById("chatInput").value;
    if(val && conn) {
        conn.send({ type: 'chat', msg: val });
        addChat("You", val);
        document.getElementById("chatInput").value = "";
    }
}

function handleIncomingData(data) {
    if(data.type === 'chat') addChat("Stranger", data.msg);
    if(data.type === 'emoji') showRain(data.val);
    if(data.type === 'draw') drawLine(data.x1, data.y1, data.x2, data.y2, "#ff0055");
}

function addChat(user, msg) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "msg-item";
    div.innerHTML = `<b>${user}:</b> ${msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

db.ref("online_users").on("value", s => document.getElementById("count").innerText = s.numChildren() || 1);

init();
</script>
</body>
</html>
