<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Pro V2</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; display: flex; flex-direction: column; }

/* Entry Animation */
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; }
.logo-container { display: flex; gap: 8px; }
.letter { font-size: 45px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px #ff0055; opacity: 0; transform: scale(0.5); animation: bounceIn 0.5s forwards; }
@keyframes bounceIn { to { opacity: 1; transform: scale(1); } }

.video-section{ flex:1; position:relative; display:flex; background:#111; overflow: hidden; }
video{ width:100%; height:100%; object-fit:cover; background:#000; }

#localVideo{ position:absolute; bottom:20px; right:15px; width:100px; height:140px; border:2px solid #55eefc; border-radius:12px; z-index: 20; object-fit: cover; background: #222; }

.controls{ position:absolute; bottom:20px; left:15px; display:flex; flex-direction: column; gap:15px; z-index: 30; }
.btn{ width:45px; height:45px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:white; font-size:18px; cursor:pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

/* ಚಾಟ್ ಬಾಕ್ಸ್ ವಿಡಿಯೋ ಮೇಲೆ ಕಾಣುವಂತೆ */
.chatBox{ position:absolute; bottom:170px; left:15px; width:70%; max-height:120px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:8px; border-radius:10px; font-size:13px; pointer-events: none; z-index: 25; display: flex; flex-direction: column; gap: 4px; }
.msg-tag { font-weight: bold; color: #55eefc; }

/* ಕೆಳಗಿನ ಬಟನ್ ಮತ್ತು ಇನ್‌ಪುಟ್ ಜಾಗ (Fixed height for visibility) */
.bottom-area { background:#111; padding: 10px 15px; display:flex; gap:8px; align-items: center; height: 60px; border-top: 1px solid #222; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
.next{ background:#ff0055; border:none; padding:10px 18px; border-radius:20px; color:white; font-weight: bold; cursor:pointer; font-size: 14px; white-space: nowrap; }
input{ flex:1; padding:10px 15px; border:none; border-radius:20px; background:#222; color:white; outline: none; font-size: 14px; }
.send-btn { background:#333; border:none; padding:10px 15px; border-radius:20px; color:white; font-size: 13px; }

.online{ position:absolute; top:20px; left:15px; background:rgba(255, 0, 85, 0.7); padding:5px 12px; border-radius:20px; font-size:12px; font-weight:bold; z-index: 50; }
.status-msg { position: absolute; top: 40%; width: 100%; text-align: center; color: #aaa; font-size: 14px; }
</style>
</head>

<body>
<div id="entry">
    <div class="logo-container" id="logoText"></div>
</div>

<div class="video-section">
    <div class="online">Online: <span id="onlineCount">0</span></div>
    <div id="status" class="status-msg">ಕನೆಕ್ಟ್ ಆಗುತ್ತಿದೆ...</div>
    <div id="chatBox" class="chatBox"></div>
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
    
    <div class="controls">
        <button class="btn" onclick="toggleAudio()" id="micBtn">🎤</button>
        <button class="btn" onclick="toggleVideo()" id="vidBtn">🎥</button>
        <button class="btn" onclick="flipCamera()">🔄</button>
    </div>
</div>

<div class="bottom-area">
    <button class="next" onclick="findStranger()">NEXT</button>
    <input id="chatInput" placeholder="ಹೇಳಿ...">
    <button class="send-btn" onclick="sendMsg()">SEND</button>
</div>

<script>
// ಫೈರ್‌ಬೇಸ್ ಕಾನ್ಫಿಗರೇಶನ್ (ನಿಮ್ಮ ಅಸಲಿ ಕೀಗಳನ್ನು ಇಲ್ಲಿ ಹಾಕಿ)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "sykolive-846a3.firebaseapp.com",
  databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/",
  projectId: "sykolive-846a3",
  storageBucket: "sykolive-846a3.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const lobby = db.ref("lobby");
const online = db.ref("online");

// ಎಂಟ್ರಿ ಅನಿಮೇಷನ್
const text = "SYKOLIVE";
const container = document.getElementById("logoText");
text.split("").forEach((char, i) => {
    const span = document.createElement("span");
    span.innerText = char;
    span.className = "letter";
    span.style.animationDelay = `${i * 0.1}s`;
    container.appendChild(span);
});

setTimeout(() => {
    document.getElementById("entry").style.display = "none";
    startApp();
}, 3500);

online.on("value", snap => { document.getElementById("onlineCount").innerText = snap.numChildren(); });

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp(){
    await startCamera();
    peer = new Peer({ 
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } 
    });
    
    peer.on("open", id => {
        myId = id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });

    peer.on("call", call => { 
        currentCall = call; 
        call.answer(myStream); 
        handleStream(call);
    });

    peer.on("connection", c => { 
        conn = c; 
        setupChat(); 
        document.getElementById("status").innerText = "";
    });
}

async function startCamera(){
    try {
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: true });
        document.getElementById("localVideo").srcObject = myStream;
    } catch(e) { alert("ಕ್ಯಾಮೆರಾ ಪರ್ಮಿಷನ್ ಬೇಕು!"); }
}

function findStranger(){
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("chatBox").innerHTML = "";
    document.getElementById("status").innerText = "ಹೊಸಬರಿಗಾಗಿ ಹುಡುಕಲಾಗುತ್ತಿದೆ...";
    
    lobby.once("value", snap => {
        let targetId = null;
        let targetKey = null;
        snap.forEach(child => { if(child.val() !== myId){ targetId = child.val(); targetKey = child.key; return true; } });
        
        if(targetId){
            lobby.child(targetKey).remove().then(() => connectToStranger(targetId));
        } else {
            const myRef = lobby.push(myId);
            myRef.onDisconnect().remove();
            lobby.on("child_added", s => { if(s.val() !== myId){ lobby.off(); findStranger(); } });
        }
    });
}

function connectToStranger(id){
    conn = peer.connect(id);
    setupChat();
    currentCall = peer.call(id, myStream);
    handleStream(currentCall);
}

function handleStream(call){
    call.on("stream", s => { 
        document.getElementById("remoteVideo").srcObject = s;
        document.getElementById("status").innerText = "";
    });
}

function setupChat(){ 
    if(!conn) return; 
    conn.on("data", msg => { addChat("Stranger", msg); }); 
}

function sendMsg(){
    let input = document.getElementById("chatInput");
    if(!input.value || !conn) return;
    addChat("You", input.value);
    conn.send(input.value);
    input.value = "";
}

function addChat(sender, text){
    let chatBox = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.innerHTML = `<span class="msg-tag">${sender}:</span> ${text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function toggleAudio(){ myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; }
function toggleVideo(){ myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; }
async function flipCamera(){ 
    facing = (facing === "user") ? "environment" : "user"; 
    myStream.getTracks().forEach(t => t.stop());
    await startCamera();
}

document.getElementById("chatInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
