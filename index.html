<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Pro Final</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100vh; }

/* ಎಂಟ್ರಿ ಅನಿಮೇಷನ್ */
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; }
.logo-container { display: flex; gap: 8px; }
.letter { font-size: 45px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px #ff0055; opacity: 0; transform: scale(0.5); animation: bounceIn 0.5s forwards; }
@keyframes bounceIn { to { opacity: 1; transform: scale(1); } }

.main{ display:flex; flex-direction:column; height:100vh; width: 100%; }
.video-section{ flex:1; position:relative; display:flex; background:#111; overflow: hidden; }
video{ width:100%; height:100%; object-fit:cover; background:#000; }

/* ನಿನ್ನ ವೀಡಿಯೊ ದೊಡ್ಡದಾಗಿರಲಿ */
#localVideo{ position:absolute; bottom:15px; right:15px; width:140px; height:190px; border:2px solid #ff0055; border-radius:12px; z-index: 20; object-fit: cover; box-shadow: 0 0 10px #000; }

/* ಚಿಕ್ಕದಾದ ಆಕ್ಷನ್ ಬಟನ್ ಗಳು */
.controls{ position:absolute; bottom:20px; left:15px; display:flex; flex-direction: column; gap:15px; z-index: 30; }
.btn{ width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,0.25); color:white; font-size:18px; cursor:pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

/* ನೆಕ್ಸ್ಟ್ ಮತ್ತು ಮೆಸೇಜ್ ಬಾಕ್ಸ್ ಪಕ್ಕಾ ಫಿಕ್ಸ್ */
.bottom{ background:#111; padding:10px 15px; display:flex; gap:10px; align-items: center; border-top: 1px solid #333; z-index: 40; height: 60px; }
.next{ background:#ff0055; border:none; padding:10px 20px; border-radius:20px; color:white; font-weight: bold; cursor:pointer; font-size: 14px; white-space: nowrap; }
input{ flex:1; padding:10px 15px; border:none; border-radius:20px; background:#222; color:white; outline: none; font-size: 14px; }
.send-btn { background:none; border:none; color:#ff0055; font-size: 22px; cursor:pointer; font-weight: bold; }

.chatBox{ position:absolute; top:70px; right:15px; width:200px; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.4); padding:10px; border-radius:10px; font-size:13px; pointer-events: none; z-index: 25; }
.online{ position:absolute; top:20px; left:15px; background:rgba(0,0,0,0.6); padding:5px 12px; border-radius:20px; font-size:11px; font-weight:bold; z-index: 50; }
</style>
</head>

<body>
<div id="entry">
    <div class="logo-container" id="logoText"></div>
</div>

<div class="main">
    <div class="video-section">
        <div class="online">● <span id="onlineCount">0</span> Online</div>
        <div id="chatBox" class="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn" onclick="toggleAudio()">🎤</button>
            <button class="btn" onclick="toggleVideo()">🎥</button>
            <button class="btn" onclick="flipCamera()">🔄</button>
        </div>
    </div>
    <div class="bottom">
        <button class="next" onclick="findStranger()">NEXT</button>
        <input id="chatInput" placeholder="Type message...">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
const firebaseConfig={ databaseURL:"https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const lobby=db.ref("lobby");
const online=db.ref("online");

// ಎಂಟ್ರಿ ಅನಿಮೇಷನ್
const text = "SYKOLIVE";
const container = document.getElementById("logoText");
text.split("").forEach((char, i) => {
    const span = document.createElement("span");
    span.innerText = char;
    span.className = "letter";
    span.style.animationDelay = `${i * 0.1}s`;
    container.appendChild(span);
});

setTimeout(() => {
    document.getElementById("entry").style.display = "none";
    startApp();
}, 3500);

online.on("value",snap=>{ document.getElementById("onlineCount").innerText=snap.numChildren() });

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp(){
    await startCamera();
    peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } });
    
    peer.on("open",id=>{
        myId=id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });

    // ಆ ಕಡೆಯ ವೀಡಿಯೊ ಫಿಕ್ಸ್
    peer.on("call", call => { 
        currentCall = call; 
        call.answer(myStream); 
        call.on("stream", s => { 
            const rv = document.getElementById("remoteVideo");
            rv.srcObject = s;
            rv.play().catch(e => console.log(e));
        });
    });

    peer.on("connection", c => { conn = c; setupChat(); });
}

async function startCamera(){
    try{
        myStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: facing, width: {ideal: 640}, height: {ideal: 480} }, audio: true 
        });
        document.getElementById("localVideo").srcObject = myStream;
    } catch(e) { console.log("Camera error"); }
}

function findStranger(){
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;
    lobby.off(); 
    lobby.once("value", snap => {
        let targetId = null;
        let targetKey = null;
        snap.forEach(child => { if(child.val() !== myId){ targetId = child.val(); targetKey = child.key; return true; } });
        if(targetId){
            lobby.child(targetKey).remove().then(() => connectToStranger(targetId));
        } else {
            const myRef = lobby.push(myId);
            myRef.onDisconnect().remove();
            lobby.on("child_added", s => { if(s.val() !== myId){ lobby.off(); findStranger(); } });
        }
    });
}

function connectToStranger(id){
    setTimeout(() => {
        conn = peer.connect(id);
        setupChat();
        currentCall = peer.call(id, myStream);
        currentCall.on("stream", s => { 
            const rv = document.getElementById("remoteVideo");
            rv.srcObject = s;
            rv.play().catch(e => console.log(e));
        });
    }, 200); 
}

function setupChat(){ if(!conn) return; conn.on("data", msg => { addChat("Stranger: " + msg); }); }
function sendMsg(){
    let input = document.getElementById("chatInput");
    if(!input.value || !conn) return;
    addChat("You: " + input.value);
    conn.send(input.value);
    input.value = "";
}
function addChat(t){
    let chatBox = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.style.marginBottom = "5px";
    div.innerText = t;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
function toggleAudio(){ myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; }
function toggleVideo(){ myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; }

async function flipCamera(){ 
    facing = (facing === "user") ? "environment" : "user"; 
    myStream.getTracks().forEach(track => track.stop());
    await startCamera();
    if(currentCall && currentCall.peerConnection){
        const videoTrack = myStream.getVideoTracks()[0];
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
}
</script>
</body>
</html>
