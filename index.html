<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Syko Live Pro V3 - All-in-One</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
:root { --primary: #ff0055; --secondary: #55eefc; }
body, html { margin:0; padding:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; width: 100%; position: fixed; }

/* ವಾಯ್ಸ್ ಲೈಟಿಂಗ್ ಎಫೆಕ್ಟ್ */
.voice-border { box-shadow: inset 0 0 20px var(--secondary), 0 0 15px var(--secondary) !important; transition: 0.2s; }

.video-grid { position: relative; width: 100%; height: calc(100dvh - 75px); background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; }
#localVideo { position: absolute; bottom: 20px; right: 15px; width: 110px; height: 150px; border: 2px solid var(--secondary); border-radius: 12px; z-index: 10; object-fit: cover; background: #222; }

/* ಮ್ಯಾಜಿಕ್ ಕ್ಯಾನ್ವಾಸ್ (Drawing) */
#magicCanvas { position: absolute; top:0; left:0; z-index: 15; pointer-events: none; }

.side-controls { position: absolute; left: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 20; }
.control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.15); color: white; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
.control-btn:active { transform: scale(0.9); }
.control-btn.active { background: var(--secondary); color: #000; }
.control-btn.off { background: rgba(255, 0, 0, 0.6); }

/* ಎಮೋಜಿ ಪ್ಯಾನಲ್ */
#emojiPanel { position: absolute; left: 70px; top: 40%; transform: translateY(-50%); background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; display: none; flex-direction: column; gap: 10px; z-index: 25; }
.emoji-item { font-size: 24px; cursor: pointer; }
.emoji-rain { position: fixed; top: -50px; font-size: 30px; z-index: 1000; animation: rain 2s linear forwards; }
@keyframes rain { to { transform: translateY(110dvh) rotate(360deg); } }

#chatBox { position: absolute; bottom: 10px; left: 15px; width: 65%; max-height: 150px; overflow-y: auto; z-index: 5; pointer-events: none; }
.msg-item { background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; pointer-events: auto; }
.post-actions { display: flex; gap: 10px; margin-top: 4px; font-size: 11px; color: var(--secondary); }

.action-bar { height: 75px; background: #000; display: flex; align-items: center; padding: 0 10px; gap: 8px; border-top: 1px solid #222; }
.next-btn { background: var(--primary); border: none; padding: 12px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }
input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }

#profileSection { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; align-items: center; gap: 10px; }
#userAvatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
.info-tag { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--primary); }
</style>
</head>

<body>
<div class="main-wrapper">
    <div class="video-grid" id="videoGrid">
        <div class="info-tag" style="position:absolute; top:15px; left:15px;">Online: <span id="count">1</span> | <span id="status">Searching...</span></div>
        
        <div id="profileSection">
            <img src="https://via.placeholder.com/150" id="userAvatar" onclick="document.getElementById('imgInput').click()">
            <input type="file" id="imgInput" style="display:none" accept="image/*" onchange="updateProfile(this)">
        </div>

        <canvas id="magicCanvas"></canvas>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div id="emojiPanel">
            <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">❤️</span><span class="emoji-item">👍</span><span class="emoji-item">😱</span>
        </div>
        
        <div class="side-controls">
            <button class="control-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="control-btn" id="vidBtn" onclick="toggleVid()">🎥</button>
            <button class="control-btn" id="flipBtn" onclick="flipCamera()">🔄</button>
            <button class="control-btn" id="drawBtn" onclick="toggleDraw()">✏️</button>
            <button class="control-btn" onclick="clearCanvas()">🗑️</button>
            <button class="control-btn" onclick="toggleEmoji()">😊</button>
        </div>

        <div id="chatBox"></div>
    </div>

    <div class="action-bar">
        <button class="next-btn" onclick="findMatch()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="control-btn" style="width:auto; padding:0 15px; border-radius:20px;" onclick="sendChat()">SEND</button>
    </div>
</div>

<script>
// --- Firebase Setup ---
const firebaseConfig = { databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/" }; // ನಿಮ್ಮ URL ಹಾಕಿ
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const peer = new Peer();
let localStream, myID, currentCall, conn;
let isDrawing = false, currentFacing = "user";

// --- ಪ್ರೊಫೈಲ್ ಅಪ್‌ಡೇಟ್ ---
function updateProfile(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('userAvatar').src = e.target.result;
            localStorage.setItem('sykoAvatar', e.target.result);
        };
        reader.readAsDataURL(input.files[0]);
    }
}
window.onload = () => {
    const saved = localStorage.getItem('sykoAvatar');
    if(saved) document.getElementById('userAvatar').src = saved;
};

// --- ಕ್ಯಾಮೆರಾ ಆರಂಭ ---
async function init() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        setupVoiceLighting(localStream);
    } catch (e) { alert("ಕ್ಯಾಮೆರಾ ಅನುಮತಿ ನೀಡಿ!"); }
}

// --- PeerJS ಲಾಜಿಕ್ ---
peer.on('open', id => {
    myID = id;
    db.ref("online_users/" + id).set({ status: "waiting" });
    db.ref("online_users/" + id).onDisconnect().remove();
    findMatch();
});

peer.on('call', call => {
    call.answer(localStream);
    setupCall(call);
});

peer.on('connection', c => {
    conn = c;
    conn.on('data', data => handleIncomingData(data));
});

function findMatch() {
    document.getElementById("status").innerText = "Searching...";
    if(currentCall) currentCall.close();
    db.ref("online_users").once("value", snapshot => {
        let found = false;
        snapshot.forEach(child => {
            if (child.key !== myID && child.val().status === "waiting" && !found) {
                found = true;
                const call = peer.call(child.key, localStream);
                conn = peer.connect(child.key);
                db.ref("online_users/" + myID).update({ status: "busy" });
                setupCall(call);
            }
        });
        if(!found) db.ref("online_users/" + myID).update({ status: "waiting" });
    });
}

function setupCall(call) {
    currentCall = call;
    call.on('stream', rs => {
        document.getElementById("remoteVideo").srcObject = rs;
        document.getElementById("status").innerText = "Connected!";
    });
}

// --- ರಿಯಲಿಸ್ಟಿಕ್ ಫೀಚರ್‌ಗಳು ---

// 1. ಸ್ಟೇಬಲ್ ಕ್ಯಾಮೆರಾ ಫ್ಲಿಪ್
async function flipCamera() {
    currentFacing = currentFacing === "user" ? "environment" : "user";
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
    const newVideoTrack = newStream.getVideoTracks()[0];
    
    if(currentCall) {
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        sender.replaceTrack(newVideoTrack);
    }
    
    localStream.getVideoTracks()[0].stop();
    localStream.removeTrack(localStream.getVideoTracks()[0]);
    localStream.addTrack(newVideoTrack);
    document.getElementById("localVideo").srcObject = localStream;
}

// 2. ವಾಯ್ಸ್ ಲೈಟಿಂಗ್
function setupVoiceLighting(stream) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    function check() {
        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b) => a+b)/data.length;
        document.getElementById("videoGrid").classList.toggle("voice-border", avg > 35);
        requestAnimationFrame(check);
    }
    check();
}

// 3. ಡ್ರಾಯಿಂಗ್ ಬೋರ್ಡ್
const canvas = document.getElementById("magicCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

function toggleDraw() {
    isDrawing = !isDrawing;
    canvas.style.pointerEvents = isDrawing ? "auto" : "none";
    document.getElementById("drawBtn").classList.toggle("active", isDrawing);
}

canvas.onpointermove = e => {
    if(isDrawing && e.buttons === 1) {
        ctx.fillStyle = "#55eefc";
        ctx.beginPath();
        ctx.arc(e.clientX, e.clientY, 4, 0, Math.PI*2);
        ctx.fill();
        if(conn) conn.send({ type: 'draw', x: e.clientX, y: e.clientY });
    }
};
function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }

// 4. ಎಮೋಜಿ ರೈನ್
function toggleEmoji() {
    const p = document.getElementById("emojiPanel");
    p.style.display = p.style.display === "flex" ? "none" : "flex";
}

document.querySelectorAll(".emoji-item").forEach(el => {
    el.onclick = () => {
        showRain(el.innerText);
        if(conn) conn.send({ type: 'emoji', val: el.innerText });
    };
});

function showRain(emoji) {
    for(let i=0; i<15; i++) {
        let s = document.createElement("span");
        s.className = "emoji-rain"; s.innerText = emoji;
        s.style.left = Math.random() * 100 + "vw";
        s.style.animationDelay = Math.random() * 0.5 + "s";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }
}

// --- ಚಾಟ್ ಮತ್ತು ಡೇಟಾ ಹ್ಯಾಂಡ್ಲಿಂಗ್ ---
function sendChat() {
    const val = document.getElementById("chatInput").value;
    if(val && conn) {
        conn.send({ type: 'chat', msg: val });
        addChat("You", val);
        document.getElementById("chatInput").value = "";
    }
}

function handleIncomingData(data) {
    if(data.type === 'chat') addChat("Stranger", data.msg);
    if(data.type === 'emoji') showRain(data.val);
    if(data.type === 'draw') {
        ctx.fillStyle = "#ff0055";
        ctx.beginPath(); ctx.arc(data.x, data.y, 4, 0, Math.PI*2); ctx.fill();
    }
}

function addChat(user, msg) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "msg-item";
    div.innerHTML = `<b>${user}:</b> ${msg} 
        <div class="post-actions"><span>❤️ Like</span> <span>💬 Reply</span> <span>🔗 Share</span></div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function toggleMic() {
    const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("micBtn").classList.toggle("off", !t.enabled);
}
function toggleVid() {
    const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("vidBtn").classList.toggle("off", !t.enabled);
}

db.ref("online_users").on("value", s => document.getElementById("count").innerText = s.numChildren());

init();
</script>
</body>
</html>
