<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Syko Live Pro V3 - Fixed Connection</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
:root { --primary: #ff0055; --secondary: #55eefc; }
body, html { margin:0; padding:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100dvh; width: 100%; position: fixed; }

/* Cinematic Entry */
#power-sequence-entry {
    position: fixed; width: 100%; height: 100%; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10000; font-family: 'Montserrat', sans-serif;
}
#fxCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
.content-entry { position: relative; z-index: 10; text-align: center; }
.logo-box { display: flex; gap: 12px; margin-bottom: 25px; }
.letter { font-size: clamp(40px, 12vw, 100px); font-weight: 900; opacity: 0; display: inline-block; }
.instagram-tag { display: flex; align-items: center; justify-content: center; gap: 10px; color: #fff; opacity: 0; transform: translateY(20px); font-size: clamp(14px, 3vw, 18px); letter-spacing: 2px; }

/* Video Interface */
.video-grid { position: relative; width: 100%; height: calc(100dvh - 75px); background: #111; display: flex; align-items: center; justify-content: center; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
#localVideo { position: absolute; bottom: 20px; right: 15px; width: 110px; height: 150px; border: 2px solid var(--primary); border-radius: 12px; z-index: 10; object-fit: cover; background: #222; }
.voice-glowing { box-shadow: 0 0 20px var(--secondary); border: 3px solid var(--secondary) !important; }

.side-controls { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 20; }
.control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.15); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

#chatBox { position: absolute; bottom: 10px; left: 15px; width: 65%; max-height: 150px; overflow-y: auto; z-index: 5; pointer-events: none; }
.msg-item { background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; pointer-events: auto; border-left: 3px solid var(--primary); }
.action-bar { height: 75px; background: #000; display: flex; align-items: center; padding: 0 10px; gap: 8px; border-top: 1px solid #222; }
.next-btn { background: var(--primary); border: none; padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }
input { flex: 1; background: #222; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
.info-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 11px; z-index: 100; border: 1px solid var(--primary); }
</style>
</head>

<body>

<div id="power-sequence-entry">
  <canvas id="fxCanvas"></canvas>
  <audio id="entryBGM" loop>
    <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Beast+BGM&filename=mt/mtkzmdm0mdu0mtkzody3_7_2f_2b_2f_2fm1t_2f.mp3" type="audio/mpeg">
  </audio>
  <div class="content-entry">
    <div class="logo-box" id="logoContainer"></div>
    <div class="instagram-tag" id="instaDiv">
       <span>made in</span>
       <span style="font-weight: bold;">ll_syko_sagar__111_ll</span>
    </div>
  </div>
</div>

<div class="main-wrapper">
    <div class="video-grid">
        <div class="info-tag">Online: <span id="count">1</span> | <span id="status">ಸಿದ್ಧವಾಗುತ್ತಿದೆ...</span></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="side-controls">
            <button class="control-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="control-btn" id="vidBtn" onclick="toggleVid()">🎥</button>
            <button class="control-btn" onclick="flipCamera()">🔄</button>
            <button class="control-btn" onclick="applyFilter()">🪄</button>
        </div>
        <div id="chatBox"></div>
    </div>
    <div class="action-bar">
        <button class="next-btn" onclick="findMatch()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="control-btn" style="width:auto; padding:0 15px; border-radius:20px;" onclick="sendChat()">SEND</button>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Cinematic Entry Logic
const entryBGM = document.getElementById('entryBGM');
const entryContainer = document.getElementById('logoContainer');
const text = "SYKOLIVE";

text.split("").forEach((char, i) => {
    const span = document.createElement('span');
    span.innerText = char;
    span.className = 'letter';
    span.style.color = ["#ff4e00", "#00d4ff", "#9d00ff", "#ffee00", "#00ff62", "#ff0055"][i % 6];
    span.animate([{ opacity: 0, transform: `scale(0)` }, { opacity: 1, transform: 'scale(1)' }], { duration: 1000, delay: i * 150, fill: 'forwards' });
    entryContainer.appendChild(span);
});

// Auto-play sound fix
document.addEventListener('touchstart', () => entryBGM.play(), {once: true});
document.addEventListener('click', () => entryBGM.play(), {once: true});

setTimeout(() => { document.getElementById('instaDiv').style.opacity = "1"; }, 2000);

setTimeout(() => {
    const entryDiv = document.getElementById('power-sequence-entry');
    entryDiv.style.transition = "opacity 2s";
    entryDiv.style.opacity = "0";
    // Fade out music
    let vol = 1.0;
    const interval = setInterval(() => {
        if (vol > 0.1) { vol -= 0.1; entryBGM.volume = vol; }
        else { entryBGM.pause(); clearInterval(interval); }
    }, 200);
    setTimeout(() => entryDiv.remove(), 2000);
}, 8000);

// Video Chat Core Logic
let peer, localStream, myID, currentCall, dataConn, currentFacing = "user";

async function init() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        setupPeer();
    } catch (e) { alert("ಕ್ಯಾಮೆರಾ ಅನುಮತಿ ಅಗತ್ಯವಿದೆ!"); }
}

function setupPeer() {
    peer = new Peer(null, { debug: 2 });
    
    peer.on('open', id => {
        myID = id;
        console.log("My Peer ID:", id);
        registerUser();
    });

    peer.on('call', call => {
        call.answer(localStream);
        handleCall(call);
    });

    peer.on('connection', conn => {
        dataConn = conn;
        setupDataListeners();
    });
}

function registerUser() {
    const userRef = db.ref("online_users/" + myID);
    userRef.set({ status: "waiting", timestamp: Date.now() });
    userRef.onDisconnect().remove();
    findMatch();
}

function findMatch() {
    if(currentCall) currentCall.close();
    document.getElementById("status").innerText = "ಹುಡುಕಲಾಗುತ್ತಿದೆ...";
    
    db.ref("online_users").once("value", snapshot => {
        let pool = [];
        snapshot.forEach(child => {
            if (child.key !== myID && child.val().status === "waiting") {
                pool.push(child.key);
            }
        });

        if (pool.length > 0) {
            const targetID = pool[Math.floor(Math.random() * pool.length)];
            
            // ಟಾರ್ಗೆಟ್ ಯೂಸರ್ ಸ್ಟೇಟಸ್ ಅಪ್‌ಡೇಟ್
            db.ref("online_users/" + myID).update({ status: "busy" });
            db.ref("online_users/" + targetID).update({ status: "busy" });

            // ಕನೆಕ್ಷನ್ ಸ್ಟಾರ್ಟ್
            dataConn = peer.connect(targetID);
            setupDataListeners();
            const call = peer.call(targetID, localStream);
            handleCall(call);
        } else {
            db.ref("online_users/" + myID).update({ status: "waiting" });
            setTimeout(findMatch, 3000); // 3 ಸೆಕೆಂಡ್ ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ
        }
    });
}

function handleCall(call) {
    currentCall = call;
    call.on('stream', remoteStream => {
        document.getElementById("remoteVideo").srcObject = remoteStream;
        document.getElementById("status").innerText = "ಕನೆಕ್ಟ್ ಆಗಿದೆ!";
    });
    call.on('close', () => {
        document.getElementById("remoteVideo").srcObject = null;
        findMatch();
    });
}

function setupDataListeners() {
    dataConn.on('data', data => {
        if(data.type === 'chat') addChat("Stranger", data.msg);
    });
}

function sendChat() {
    const val = document.getElementById("chatInput").value;
    if(val && dataConn) {
        dataConn.send({ type: 'chat', msg: val });
        addChat("You", val);
        document.getElementById("chatInput").value = "";
    }
}

function addChat(user, msg) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "msg-item";
    div.innerHTML = `<b>${user}:</b> ${msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// Controls
function toggleMic() {
    const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("micBtn").innerText = t.enabled ? "🎤" : "🔇";
}
function toggleVid() {
    const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
    document.getElementById("vidBtn").innerText = t.enabled ? "🎥" : "🚫";
}

db.ref("online_users").on("value", s => document.getElementById("count").innerText = s.numChildren());
init();
</script>
</body>
</html>
