        <!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Ultra - Full Version</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body,html{margin:0;padding:0;background:#000;font-family:sans-serif;color:white;overflow:hidden;height:100%;width:100%;position:fixed;}
.main-wrapper{display:flex;flex-direction:column;height:100dvh;width:100vw;}
.video-grid{flex:1;position:relative;background:#111;overflow:hidden;transition:0.3s;}

/* 🔥 Voice Lighting Border - ಇದನ್ನೇ ನೀವು ಕೇಳಿದ್ದು */
.voice-border{box-shadow: inset 0 0 60px #ff0055, 0 0 40px #ff0055 !important; border: 4px solid #ff0055 !important;}

#remoteVideo{width:100%;height:100%;object-fit:cover;background:#111;}
#localVideo{position:absolute;bottom:10px;right:10px;width:110px;height:150px;border:2px solid #55eefc;border-radius:12px;z-index:100;object-fit:cover;background:#222;}
#magicCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:80;pointer-events:none;}

.side-controls{position:absolute;left:10px;top:15%;display:flex;flex-direction:column;gap:12px;z-index:110;}
.control-btn{width:50px;height:50px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* 😊 Emoji Panel */
#emojiPanel{position:absolute;right:10px;top:30%;background:rgba(0,0,0,0.8);padding:10px;border-radius:12px;display:none;flex-wrap:wrap;width:150px;gap:8px;z-index:200;}
.emoji-item{font-size:25px;cursor:pointer;}
.emoji-rain{position:absolute;font-size:45px;animation:emojiFall 2s linear forwards;z-index:300;}
@keyframes emojiFall{0%{transform:translateY(-50px);opacity:1;}100%{transform:translateY(110vh);opacity:0;}}

.info-tag{position:absolute;top:15px;left:15px;background:rgba(0,0,0,0.6);padding:6px 15px;border-radius:20px;font-size:12px;z-index:110;}
#chatBox{position:absolute;bottom:15px;left:15px;width:60%;max-height:150px;overflow-y:auto;z-index:110;pointer-events:none;}

.action-bar{height:80px;background:#000;border-top:1px solid #222;display:flex;align-items:center;padding:0 15px;gap:10px;}
.next-btn{background:#ff0055;border:none;padding:14px 25px;border-radius:30px;color:white;font-weight:bold;cursor:pointer;font-size:16px;}
input{flex:1;background:#1a1a1a;border:1px solid #333;padding:14px 20px;border-radius:30px;color:white;outline:none;}
.send-btn{background:#333;border:none;padding:14px 22px;border-radius:30px;color:white;cursor:pointer;}

/* 🚀 Entry Screen */
#entry{position:fixed;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;font-size:35px;color:#ff0055;z-index:3000;font-weight:bold;letter-spacing:5px;}
</style>
</head>

<body>

<div id="entry">SYKO LIVE</div>

<div class="main-wrapper">
    <div class="video-grid" id="videoGrid">
        <div class="info-tag">Status: <span id="status">Connecting...</span></div>
        <canvas id="magicCanvas"></canvas>
        <div id="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>

        <div class="side-controls">
            <button class="control-btn" id="micBtn">🎤</button>
            <button class="control-btn" id="vidBtn">🎥</button>
            <button class="control-btn" id="flipBtn">🔄</button> <button class="control-btn" id="drawBtn">✏️</button> <button class="control-btn" id="clearBtn">🗑️</button> <button class="control-btn" id="emojiBtn">😊</button> </div>

        <div id="emojiPanel">
            <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">😍</span>
            <span class="emoji-item">😎</span><span class="emoji-item">❤️</span><span class="emoji-item">👍</span>
            <span class="emoji-item">😱</span><span class="emoji-item">🎉</span>
        </div>
    </div>

    <div class="action-bar">
        <button class="next-btn" onclick="location.reload()">NEXT</button>
        <input type="text" id="chatInput" placeholder="ಹಲೋ ಹೇಳಿ...">
        <button class="send-btn" id="sendBtn">SEND</button>
    </div>
</div>

<script>
// 1. Entry Screen Animation
setTimeout(() => {
    const entry = document.getElementById("entry");
    entry.style.transition = "1s";
    entry.style.opacity = "0";
    setTimeout(() => entry.style.display = "none", 1000);
}, 2500);

// 2. Video & Flip Logic (PeerJS)
const peer = new Peer();
let localStream;
let currentFacingMode = "user";

async function startCamera() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    try {
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacingMode },
            audio: true
        });
        document.getElementById("localVideo").srcObject = localStream;
        document.getElementById("status").innerText = "Ready to Connect";
        setupVoiceLighting(localStream);
    } catch (e) {
        alert("Camera Permission Required!");
    }
}

document.getElementById("flipBtn").onclick = () => {
    currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
    startCamera();
};

// 3. 🔥 Voice Lighting Border Logic
function setupVoiceLighting(stream) {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    analyser.fftSize = 256;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function animate() {
        analyser.getByteFrequencyData(dataArray);
        let avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
        const grid = document.getElementById("videoGrid");
        if (avg > 30) {
            grid.classList.add("voice-border");
        } else {
            grid.classList.remove("voice-border");
        }
        requestAnimationFrame(animate);
    }
    animate();
}

// 4. Drawing Logic
const canvas = document.getElementById("magicCanvas");
const ctx = canvas.getContext("2d");
let isDrawing = false;
let canDraw = false;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

document.getElementById("drawBtn").onclick = function() {
    canDraw = !canDraw;
    this.style.background = canDraw ? "#ff0055" : "rgba(255,255,255,0.2)";
    canvas.style.pointerEvents = canDraw ? "auto" : "none";
};

document.getElementById("clearBtn").onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

canvas.onpointerdown = (e) => { if(canDraw){ isDrawing = true; ctx.beginPath(); ctx.moveTo(e.clientX, e.clientY); }};
canvas.onpointermove = (e) => {
    if(isDrawing && canDraw) {
        ctx.lineWidth = 4; ctx.strokeStyle = "#55eefc";
        ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
    }
};
canvas.onpointerup = () => isDrawing = false;

// 5. 😊 Emoji Panel & Rain
document.getElementById("emojiBtn").onclick = () => {
    const p = document.getElementById("emojiPanel");
    p.style.display = p.style.display === "flex" ? "none" : "flex";
};

document.querySelectorAll(".emoji-item").forEach(el => {
    el.onclick = () => {
        for(let i=0; i<15; i++) {
            let s = document.createElement("span");
            s.className = "emoji-rain";
            s.innerText = el.innerText;
            s.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 2000);
        }
    };
});

// Peer Connection Events
peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', remoteStream => {
        document.getElementById("remoteVideo").srcObject = remoteStream;
        document.getElementById("status").innerText = "Connected!";
    });
});

// Start Initial Camera
startCamera();
</script>

</body>
</html>
