<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live - Auto Connect</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100vh; }
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:999; }
.entryTitle{ font-size:40px; font-weight:bold; color:#ff0055; }
.enterBtn{ margin-top:30px; padding:15px 50px; border:none; border-radius:40px; background:#ff0055; color:white; font-size:18px; cursor:pointer; }
.main{ display:flex; flex-direction:column; height:100vh; }
.video-section{ flex:1; position:relative; display:flex; background:#111; }
video{ width:100%; height:100%; object-fit:cover; }
#localVideo{ position:absolute; bottom:20px; right:20px; width:120px; height:160px; border:2px solid #ff0055; border-radius:10px; z-index: 10; background:#000; }
.controls{ position:absolute; bottom:30px; left:20px; display:flex; gap:15px; z-index: 10; }
.btn{ width:50px; height:50px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:white; font-size:20px; backdrop-filter:blur(5px); }
.status-bar{ position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.6); padding:8px 15px; border-radius:20px; font-size:12px; z-index: 10; }
.bottom{ background:#111; padding:15px; display:flex; gap:10px; border-top:1px solid #222; }
input{ flex:1; padding:12px; border-radius:20px; border:none; background:#222; color:white; outline:none; }
.next-btn{ background:#ff0055; border:none; padding:0 25px; border-radius:20px; color:white; font-weight:bold; }
.chatBox{ position:absolute; top:70px; right:20px; width:200px; max-height:200px; overflow-y:auto; font-size:12px; pointer-events:none; }
</style>
</head>

<body>
<div id="entry">
    <div class="entryTitle">SYKO LIVE</div>
    <p>Connecting you to the world...</p>
    <button class="enterBtn" onclick="startApp()">START CHAT</button>
</div>

<div class="main">
    <div class="video-section">
        <div class="status-bar" id="status">Status: Initializing...</div>
        <div class="chatBox" id="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn" onclick="toggleAudio()">🎤</button>
            <button class="btn" onclick="toggleVideo()">🎥</button>
            <button class="btn" onclick="flipCamera()">🔄</button>
        </div>
    </div>
    <div class="bottom">
        <input id="chatInput" placeholder="Type a message...">
        <button class="next-btn" onclick="sendMsg()">SEND</button>
        <button class="next-btn" style="background:#444;" onclick="findStranger()">NEXT</button>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const lobby = db.ref("lobby");

let peer, myId, myStream, currentCall, conn, isSearching = false;

async function startApp() {
    document.getElementById("entry").style.display = "none";
    await startCamera();
    
    peer = new Peer({
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
    });

    peer.on("open", id => {
        myId = id;
        updateStatus("Online - Looking for someone...");
        findStranger(); // ಆಟೋಮ್ಯಾಟಿಕ್ ಆಗಿ ಹುಡುಕಲು ಶುರು ಮಾಡುತ್ತದೆ
    });

    peer.on("call", call => {
        isSearching = false;
        currentCall = call;
        call.answer(myStream);
        call.on("stream", stream => { 
            document.getElementById("remoteVideo").srcObject = stream;
            updateStatus("Connected!");
        });
        call.on("close", () => { autoReconnect(); });
    });

    peer.on("connection", c => {
        conn = c;
        c.on("data", data => addChat("Stranger: " + data));
        c.on("close", () => autoReconnect());
    });
}

async function startCamera() {
    try {
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = myStream;
    } catch (e) { alert("Camera access is needed!"); }
}

function findStranger() {
    if (isSearching) return;
    isSearching = true;
    updateStatus("Searching for stranger...");
    
    if (currentCall) currentCall.close();
    if (conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;

    lobby.once("value", snap => {
        let strangerId = null;
        snap.forEach(child => {
            if (child.val() !== myId && !strangerId) {
                strangerId = child.val();
                lobby.child(child.key).remove();
            }
        });

        if (strangerId) {
            connect(strangerId);
        } else {
            const myWait = lobby.push(myId);
            myWait.onDisconnect().remove();
        }
    });
}

function connect(id) {
    currentCall = peer.call(id, myStream);
    currentCall.on("stream", stream => {
        document.getElementById("remoteVideo").srcObject = stream;
        updateStatus("Connected!");
        isSearching = false;
    });
    
    conn = peer.connect(id);
    conn.on("open", () => { isSearching = false; });
}

function autoReconnect() {
    updateStatus("Stranger disconnected. Searching again...");
    setTimeout(() => { isSearching = false; findStranger(); }, 2000);
}

function updateStatus(txt) { document.getElementById("status").innerText = "Status: " + txt; }

function sendMsg() {
    let msg = chatInput.value;
    if (msg && conn) {
        addChat("You: " + msg);
        conn.send(msg);
        chatInput.value = "";
    }
}

function addChat(t) {
    let div = document.createElement("div");
    div.innerText = t;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function toggleAudio() { myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; }
function toggleVideo() { myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; }
async function flipCamera() { /* Same logic as before */ }
</script>
</body>
</html>
