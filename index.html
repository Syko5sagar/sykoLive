<!DOCTYPE html>
<html>
<head>
    <title>Insta Booster</title>
</head>
<body>
    <h1>Instagram Booster</h1>
    <form action="/boost" method="post">
        <input type="text" name="url" placeholder="Paste Reel Link Here" required>
        <select name="type">
            <option value="views">Views</option>
            <option value="likes">Likes</option>
        </select>
        <button type="submit">Start Boost</button>
    </form>
</body>
</html>
