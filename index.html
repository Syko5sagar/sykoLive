<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Pro</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100vh; }

/* 1. ಎಂಟ್ರಿ ಅನಿಮೇಷನ್ ಡಿಸೈನ್ (3 Seconds) */
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:999; }
.logo-container { display: flex; gap: 8px; }
.letter {
    font-size: 45px; font-weight: bold; color: #ff0055;
    text-shadow: 0 0 15px #ff0055; opacity: 0;
    transform: scale(0.5);
    animation: bounceIn 0.5s forwards;
}
@keyframes bounceIn {
    to { opacity: 1; transform: scale(1); }
}

.main{ display:flex; flex-direction:column; height:100vh; }
.video-section{ flex:1; position:relative; display:flex; background:#111; }
video{ width:100%; height:100%; object-fit:cover; background:#000; }

/* 2. ಲೋಕಲ್ ವೀಡಿಯೊ */
#localVideo{ position:absolute; bottom:20px; right:20px; width:110px; height:150px; border:2px solid #ff0055; border-radius:12px; z-index: 10; object-fit: cover; }

/* 3. ಆಕ್ಷನ್ ಬಟನ್ ಗಳು (ಯಾವುದನ್ನೂ ತೆಗೆದಿಲ್ಲ) */
.controls{ position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:20px; z-index: 5; }
.btn{ width:55px; height:55px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:white; font-size:20px; cursor:pointer; }

/* 4. ಬಾಟಮ್ ಸೆಕ್ಷನ್ ಮತ್ತು ನೆಕ್ಸ್ಟ್ ಬಟನ್ */
.bottom{ background:#111; padding:12px; display:flex; gap:10px; align-items: center; border-top: 1px solid #222; }
.next{ background:#ff0055; border:none; padding:12px 20px; border-radius:25px; color:white; font-weight: bold; cursor:pointer; }
input{ flex:1; padding:12px; border:none; border-radius:25px; background:#222; color:white; outline: none; }
.chatBox{ position:absolute; top:70px; right:15px; width:220px; max-height:180px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; font-size:13px; pointer-events: none; z-index: 5; }
.online{ position:absolute; top:20px; left:15px; background:rgba(255, 0, 85, 0.8); padding:6px 15px; border-radius:20px; font-size:12px; font-weight:bold; z-index: 5; }
</style>
</head>

<body>
<div id="entry">
    <div class="logo-container" id="logoText"></div>
</div>

<div class="main">
    <div class="video-section">
        <div class="online">Online: <span id="onlineCount">0</span></div>
        <div id="chatBox" class="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn" onclick="toggleAudio()">🎤</button>
            <button class="btn" onclick="toggleVideo()">🎥</button>
            <button class="btn" onclick="flipCamera()">🔄</button>
        </div>
    </div>
    <div class="bottom">
        <button class="next" onclick="findStranger()">NEXT</button>
        <input id="chatInput" placeholder="ಟೈಪ್ ಮಾಡಿ...">
        <button class="next" style="background:#333;" onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
const firebaseConfig={ databaseURL:"https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const lobby=db.ref("lobby");
const online=db.ref("online");

// ಎಂಟ್ರಿ ಅನಿಮೇಷನ್ (3.5 Seconds)
const text = "SYKOLIVE";
const container = document.getElementById("logoText");
text.split("").forEach((char, i) => {
    const span = document.createElement("span");
    span.innerText = char;
    span.className = "letter";
    span.style.animationDelay = `${i * 0.1}s`;
    container.appendChild(span);
});

setTimeout(() => {
    document.getElementById("entry").style.display = "none";
    startApp();
}, 3500);

online.on("value",snap=>{ document.getElementById("onlineCount").innerText=snap.numChildren() });

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp(){
    await startCamera();
    peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });
    
    peer.on("open",id=>{
        myId=id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });

    // ಈ ವಿಭಾಗವೇ ಆ ಕಡೆಯಿಂದ ವಿಡಿಯೋ ತೋರಿಸಲು ಕಾರಣ
    peer.on("call", call => { 
        currentCall = call; 
        call.answer(myStream); 
        call.on("stream", s => { 
            document.getElementById("remoteVideo").srcObject = s; 
        });
    });

    peer.on("connection", c => { conn = c; setupChat(); });
}

async function startCamera(){
    try{
        myStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: facing, width: 640, height: 480 }, audio: true 
        });
        document.getElementById("localVideo").srcObject = myStream;
    } catch(e) { console.log("Camera error"); }
}

function findStranger(){
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;
    lobby.off(); 
    lobby.once("value", snap => {
        let targetId = null;
        let targetKey = null;
        snap.forEach(child => { if(child.val() !== myId){ targetId = child.val(); targetKey = child.key; return true; } });
        if(targetId){
            lobby.child(targetKey).remove().then(() => connectToStranger(targetId));
        } else {
            const myRef = lobby.push(myId);
            myRef.onDisconnect().remove();
            lobby.on("child_added", s => { if(s.val() !== myId){ lobby.off(); findStranger(); } });
        }
    });
}

function connectToStranger(id){
    setTimeout(() => {
        conn = peer.connect(id);
        setupChat();
        currentCall = peer.call(id, myStream);
        currentCall.on("stream", s => { 
            document.getElementById("remoteVideo").srcObject = s; 
        });
    }, 100); 
}

function setupChat(){ if(!conn) return; conn.on("data", msg => { addChat("Stranger: " + msg); }); }
function sendMsg(){
    let input = document.getElementById("chatInput");
    if(!input.value || !conn) return;
    addChat("You: " + input.value);
    conn.send(input.value);
    input.value = "";
}
function addChat(t){
    let chatBox = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.innerText = t;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
function toggleAudio(){ myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; }
function toggleVideo(){ myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; }

async function flipCamera(){ 
    facing = (facing === "user") ? "environment" : "user"; 
    myStream.getTracks().forEach(track => track.stop());
    await startCamera();
    if(currentCall && currentCall.peerConnection){
        const videoTrack = myStream.getVideoTracks()[0];
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
}
</script>
</body>
</html>
