<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live Ultra Fast</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:#000; font-family:sans-serif; color:white; overflow:hidden; height: 100vh; }
#entry{ position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:999; }
.entryTitle{ font-size:40px; font-weight:bold; color:#ff0055; }
.enterBtn{ margin-top:30px; padding:14px 40px; border:none; border-radius:40px; background:#ff0055; color:white; font-size:18px; cursor:pointer; }
.main{ display:flex; flex-direction:column; height:100vh; }
.video-section{ flex:1; position:relative; display:flex; background:#111; }
video{ width:100%; height:100%; object-fit:cover; background:#000; }
#localVideo{ position:absolute; bottom:10px; right:10px; width:100px; height:130px; border:2px solid #ff0055; border-radius:10px; z-index: 10; }
.controls{ position:absolute; bottom:20px; width:100%; display:flex; justify-content:center; gap:15px; z-index: 5; }
.btn{ width:50px; height:50px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:white; font-size:18px; }
.bottom{ background:#111; padding:10px; display:flex; gap:10px; align-items: center; }
.next{ background:#ff0055; border:none; padding:12px 20px; border-radius:20px; color:white; font-weight: bold; }
input{ flex:1; padding:12px; border:none; border-radius:20px; background:#222; color:white; outline: none; }
.chatBox{ position:absolute; top:60px; right:10px; width:200px; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:8px; border-radius:10px; font-size:12px; pointer-events: none; }
.online{ position:absolute; top:20px; left:10px; background:rgba(0,0,0,0.7); padding:6px 12px; border-radius:20px; font-size:11px; }
</style>
</head>

<body>
<div id="entry">
    <div class="entryTitle">SYKO LIVE</div>
    <button class="enterBtn" onclick="startApp()">ENTER</button>
</div>

<div class="main">
    <div class="video-section">
        <div class="online">Online: <span id="onlineCount">0</span></div>
        <div id="chatBox" class="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn" onclick="toggleAudio()">🎤</button>
            <button class="btn" onclick="toggleVideo()">🎥</button>
            <button class="btn" onclick="flipCamera()">🔄</button>
        </div>
    </div>
    <div class="bottom">
        <button class="next" onclick="findStranger()">NEXT</button>
        <input id="chatInput" placeholder="Type message">
        <button class="next" style="background:#444;" onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
const firebaseConfig={ databaseURL:"https://sykolive-846a3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const lobby=db.ref("lobby");
const online=db.ref("online");

online.on("value",snap=>{ document.getElementById("onlineCount").innerText=snap.numChildren() });

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp(){
    document.getElementById("entry").style.display="none";
    await startCamera();
    
    peer = new Peer({
        config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]}
    });
    
    peer.on("open",id=>{
        myId=id;
        online.child(id).set(true);
        online.child(id).onDisconnect().remove();
        findStranger();
    });

    peer.on("call", call => { 
        currentCall = call; 
        call.answer(myStream); 
        call.on("stream", s => { document.getElementById("remoteVideo").srcObject = s; });
    });

    peer.on("connection", c => { conn = c; setupChat(); });
}

// ಸಾಗರ್, ಇಲ್ಲಿ ಸ್ಪೀಡ್‌ಗಾಗಿ ರೆಸಲ್ಯೂಶನ್ ಆಪ್ಟಿಮೈಸ್ ಮಾಡಲಾಗಿದೆ
async function startCamera(){
    try{
        myStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: facing, width: {ideal: 400}, height: {ideal: 300}, frameRate: 20 }, 
            audio: true 
        });
        document.getElementById("localVideo").srcObject = myStream;
    } catch(e) { alert("Camera error"); }
}

function findStranger(){
    if(currentCall) currentCall.close();
    if(conn) conn.close();
    document.getElementById("remoteVideo").srcObject = null;
    lobby.off(); 

    lobby.once("value", snap => {
        let targetId = null;
        let targetKey = null;
        snap.forEach(child => {
            if(child.val() !== myId){
                targetId = child.val();
                targetKey = child.key;
                return true; 
            }
        });

        if(targetId){
            lobby.child(targetKey).remove().then(() => connectToStranger(targetId));
        } else {
            const myRef = lobby.push(myId);
            myRef.onDisconnect().remove();
            lobby.on("child_added", s => {
                if(s.val() !== myId){ lobby.off(); findStranger(); }
            });
        }
    });
}

function connectToStranger(id){
    // ಕೇವಲ 50ms - ಮಿಂಚಿನ ವೇಗ
    setTimeout(() => {
        conn = peer.connect(id);
        setupChat();
        currentCall = peer.call(id, myStream);
        currentCall.on("stream", s => { document.getElementById("remoteVideo").srcObject = s; });
    }, 50); 
}

function setupChat(){ 
    if(!conn) return;
    conn.on("data", msg => { addChat("Stranger: " + msg); });
}

function sendMsg(){
    let input = document.getElementById("chatInput");
    if(!input.value || !conn) return;
    addChat("You: " + input.value);
    conn.send(input.value);
    input.value = "";
}

function addChat(t){
    let chatBox = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.innerText = t;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function toggleAudio(){ myStream.getAudioTracks()[0].enabled = !myStream.getAudioTracks()[0].enabled; }
function toggleVideo(){ myStream.getVideoTracks()[0].enabled = !myStream.getVideoTracks()[0].enabled; }

async function flipCamera(){ 
    facing = facing === "user" ? "environment" : "user"; 
    myStream.getTracks().forEach(track => track.stop());
    await startCamera();
}
</script>
</body>
</html>
