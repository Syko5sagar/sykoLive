<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Syko Live</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
color:white;
overflow-x:hidden; 
height: 100vh;
}

/* ENTRY SCREEN */
#entry{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(120deg,#000,#111,#000);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}

.entryTitle{
font-size:40px;
font-weight:bold;
letter-spacing:3px;
color:#ff0055;
}

.entrySub{
margin-top:10px;
color:#aaa;
font-size:14px;
}

.enterBtn{
margin-top:30px;
padding:14px 40px;
border:none;
border-radius:40px;
background:#ff0055;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff0055;
}

/* APP STRUCTURE */
.main{
display:flex;
flex-direction:column;
height:100vh;
}

.video-section{
flex:1;
position:relative;
display:flex;
background:#111;
min-height: 0;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

#localVideo{
position:absolute;
bottom:10px;
right:10px;
width:100px;
height:130px;
border:2px solid #00f2fe;
border-radius:10px;
z-index: 10;
background:#000;
}

.controls{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
z-index: 5;
}

.btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
color:white;
font-size:18px;
cursor:pointer;
backdrop-filter: blur(5px);
}

.bottom{
background:#111;
padding:10px;
display:flex;
gap:10px;
align-items: center;
border-top: 1px solid #222;
}

.next{
background:#ff0055;
border:none;
padding:12px 20px;
border-radius:20px;
color:white;
font-weight: bold;
cursor: pointer;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
background:#222;
color:white;
outline: none;
}

.chatBox{
position:absolute;
top:60px;
right:10px;
width:180px;
max-height:150px;
overflow-y:auto;
background:rgba(0,0,0,0.5);
padding:8px;
border-radius:10px;
font-size:11px;
z-index: 5;
pointer-events: none;
}

.online{
position:absolute;
top:20px;
left:10px;
background:rgba(0,0,0,0.7);
padding:6px 12px;
border-radius:20px;
font-size:11px;
z-index: 5;
}

@media (min-width: 768px) {
    #localVideo { width: 150px; height: 200px; }
    .chatBox { width: 220px; max-height: 200px; }
    .btn { width: 60px; height: 60px; }
}
</style>
</head>

<body>
<div id="entry">
    <div class="entryTitle">SYKO LIVE</div>
    <div class="entrySub">Random Video Chat</div>
    <button class="enterBtn" onclick="startApp()">ENTER</button>
</div>

<div class="main">
    <div class="video-section">
        <div class="online">Online: <span id="onlineCount">0</span></div>
        <div class="chatBox" id="chatBox"></div>
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="controls">
            <button class="btn" onclick="toggleAudio()">🎤</button>
            <button class="btn" onclick="toggleVideo()">🎥</button>
            <button class="btn" onclick="flipCamera()">🔄</button>
        </div>
    </div>
    <div class="bottom">
        <button class="next" onclick="findStranger()">NEXT</button>
        <input id="chatInput" placeholder="Type message">
        <button class="next" style="background:#444;" onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
const firebaseConfig={
    databaseURL:"https://sykolive-846a3-default-rtdb.firebaseio.com/"
}
firebase.initializeApp(firebaseConfig)
const db=firebase.database()
const lobby=db.ref("lobby")
const online=db.ref("online")

// ಆನ್‌ಲೈನ್ ಕೌಂಟ್ ಅಪ್‌ಡೇಟ್
online.on("value",snap=>{ document.getElementById("onlineCount").innerText=snap.numChildren() })

let peer, myId, myStream, currentCall, conn, facing="user";

async function startApp(){
    document.getElementById("entry").style.display="none"
    await startCamera()
    
    peer=new Peer({
        config:{ 'iceServers':[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}] }
    })
    
    peer.on("open",id=>{
        myId=id
        online.child(id).set(true)
        online.child(id).onDisconnect().remove()
    })

    // ಯಾರಾದರೂ ನಮಗೆ ಕಾಲ್ ಮಾಡಿದಾಗ (Inbound)
    peer.on("call",call=>{ 
        currentCall=call; 
        call.answer(myStream); 
        setupCall(call); 
    })

    // ಚಾಟ್ ಕನೆಕ್ಷನ್ ಬಂದಾಗ
    peer.on("connection",c=>{ 
        conn=c; 
        setupChat(); 
    })
}

async function startCamera(){
    try{
        myStream=await navigator.mediaDevices.getUserMedia({ video:true, audio:true })
        document.getElementById("localVideo").srcObject=myStream
    }catch(e){ alert("Camera permission required") }
}

function findStranger(){
    // ಹಳೆಯ ಕಾಲ್ ಮತ್ತು ಚಾಟ್ ಕ್ಲೋಸ್ ಮಾಡು
    if(currentCall) currentCall.close()
    if(conn) conn.close()
    document.getElementById("remoteVideo").srcObject=null
    
    // ಲಾಬಿಯಲ್ಲಿ ಯಾರಿದ್ದಾರೆ ಎಂದು ಚೆಕ್ ಮಾಡು
    lobby.once("value", snap => {
        let strangerId = null;
        let found = false;
        
        snap.forEach(child => {
            if(!found && child.val() !== myId){
                strangerId = child.val();
                found = true;
                lobby.child(child.key).remove(); // ಸಿಕ್ಕಿದವರ ಐಡಿಯನ್ನು ಲಾಬಿಯಿಂದ ತೆಗೆಯುವುದು
            }
        });

        if(found && strangerId){
            // ಬೇರೆಯವರು ಸಿಕ್ಕಿದರೆ ಅವರಿಗೆ ನಾವು ಕಾಲ್ ಮಾಡುವುದು
            connectToStranger(strangerId);
        } else {
            // ಯಾರೂ ಇಲ್ಲದಿದ್ದರೆ ನಮ್ಮ ಐಡಿಯನ್ನು ಲಾಬಿಯಲ್ಲಿ ಹಾಕುವುದು
            const myRef = lobby.push(myId);
            myRef.onDisconnect().remove();
        }
    });
}

function connectToStranger(id){
    // ವೀಡಿಯೊ ಕರೆ
    currentCall = peer.call(id, myStream);
    setupCall(currentCall);
    
    // ಮೆಸೇಜ್ ಕನೆಕ್ಷನ್
    conn = peer.connect(id);
    setupChat();
}

function setupCall(call){ 
    call.on("stream", stream => { 
        document.getElementById("remoteVideo").srcObject = stream; 
    }); 
}

function setupChat(){ 
    if(!conn) return;
    conn.on("data", msg => { 
        addChat("Stranger: " + msg); 
    });
}

function sendMsg(){
    let input = document.getElementById("chatInput");
    let msg = input.value;
    if(!msg || !conn) return;
    addChat("You: " + msg);
    conn.send(msg);
    input.value = "";
}

function addChat(t){
    let chatBox = document.getElementById("chatBox");
    let div = document.createElement("div");
    div.innerText = t;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function toggleAudio(){ 
    let t=myStream.getAudioTracks()[0]; 
    t.enabled=!t.enabled; 
}

function toggleVideo(){ 
    let t=myStream.getVideoTracks()[0]; 
    t.enabled=!t.enabled; 
}

async function flipCamera(){ 
    facing = facing === "user" ? "environment" : "user"; 
    myStream.getTracks().forEach(track => track.stop());
    await startCamera();
    
    if(currentCall && currentCall.peerConnection) {
        let videoTrack = myStream.getVideoTracks()[0];
        let sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if(sender) sender.replaceTrack(videoTrack);
    }
}
</script>
</body>
</html>
