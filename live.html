<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent bf/gf - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: white; padding-top: 85px; }
        .header { position: fixed; top: 0; width: 100%; background: #000; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 3px solid #32cd32; z-index: 1000; }
        .app-name { font-family: 'Playfair Display', serif; font-size: 26px; color: #32cd32; font-weight: 900; }
        .user-card { background: #0d0d0d; border: 1px solid #222; border-radius: 35px; padding: 22px; margin-bottom: 25px; }
        .user-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #ff4d4d; object-fit: cover; }
        .user-info h3 { color: #4da6ff; font-size: 21px; }
        .price-tag { color: #ff007f; font-weight: 800; font-size: 19px; }
        .book-now { width: 100%; background: #ff00e5; color: white; border: none; padding: 16px; border-radius: 20px; font-weight: 700; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-name" onclick="location.href='home.html'">Rent bf/gf</div>
        <div style="font-size: 12px; color: #ff007f;">LIVE ಪಟ್ಟಿ</div>
    </div>
    <div class="feed-container" id="profiles-list">
        <p style="text-align:center; color:#444; margin-top:100px;">ಲೋಡ್ ಆಗುತ್ತಿದೆ...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", authDomain: "sykolive-846a3.firebaseapp.com", projectId: "sykolive-846a3" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('profiles-list');
            list.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="user-card">
                        <div style="display:flex; align-items:center; gap:20px;">
                            <img src="${data.profilePic || 'https://via.placeholder.com/150'}" class="user-img">
                            <div class="user-info">
                                <h3>${data.name || 'User'}, ${data.age || '20'}</h3>
                                <span class="price-tag">₹${data.rate || '500'} / Day</span>
                            </div>
                        </div>
                        <button class="book-now">ಈಗಲೇ ಬುಕ್ ಮಾಡಿ</button>
                    </div>`;
            });
            if (snapshot.empty) list.innerHTML = "<p style='text-align:center;'>ಯಾರೂ ಲೈವ್ ಇಲ್ಲ.</p>";
        });
    </script>
</body>
</html>
