<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Chat with Expert</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .chat-header { background: #111; padding: 15px; border-bottom: 2px solid #32cd32; text-align: center; }
        #messages { height: 70vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 10px; border-radius: 10px; margin: 5px; max-width: 70%; }
        .sent { background: #32cd32; color: black; align-self: flex-end; }
        .received { background: #222; align-self: flex-start; }
        .input-area { position: fixed; bottom: 0; width: 100%; display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; }
        button { background: #ff007f; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="chat-header"><h3 id="chatName">Chat</h3></div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="ನಿಮ್ಮ ಮೆಸೇಜ್ ಟೈಪ್ ಮಾಡಿ...">
        <button id="sendBtn">Send</button>
    </div>

    <script type="module">
        // Firebase code to send and receive messages
        // ಇಲ್ಲಿ ನೀವು Firestore ನ 'messages' ಕಲೆಕ್ಷನ್ ಬಳಸಬಹುದು
    </script>
</body>
</html>
