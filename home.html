                }<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .setup-container { background: #0a0a0a; padding: 30px; border-radius: 35px; border: 1px solid #222; width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(50, 205, 50, 0.1); }
        .profile-upload { width: 110px; height: 110px; margin: 0 auto 20px; border: 2px solid #32cd32; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; background: #111; }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        .profile-upload span { font-size: 40px; color: #32cd32; }
        input, select { width: 100%; padding: 14px; margin: 12px 0; border-radius: 15px; border: 1px solid #333; background: #151515; color: white; outline: none; font-size: 14px; }
        .save-btn { width: 100%; background: linear-gradient(to right, #32cd32, #adff2f); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .loading { display: none; color: #32cd32; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="setup-container">
        <h2 style="color: #32cd32; margin-bottom: 20px;">ನಿಮ್ಮ ಪ್ರೊಫೈಲ್ ಸೆಟ್ ಮಾಡಿ</h2>
        
        <div class="profile-upload" id="uploadBox" onclick="document.getElementById('fileInput').click()">
            <img id="preview" src="" style="display:none;">
            <span id="plus">+</span>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*">
        
        <input type="text" id="userName" placeholder="ನಿಮ್ಮ ಹೆಸರು">
        <input type="number" id="userAge" placeholder="ನಿಮ್ಮ ವಯಸ್ಸು">
        
        <label style="display:block; text-align:left; font-size:12px; color:#888; margin-left:5px;">ದಿನದ ರೇಟ್ ಆಯ್ಕೆ ಮಾಡಿ:</label>
        <select id="userRate">
            <option value="500">₹500 / Day</option>
            <option value="1000">₹1000 / Day</option>
            <option value="1500" selected>₹1500 / Day</option>
        </select>
        
        <button class="save-btn" id="saveBtn">SAVE & CONTINUE</button>
        <p class="loading" id="loader">ಸೇವ್ ಆಗುತ್ತಿದೆ, ದಯವಿಟ್ಟು ಕಾಯಿರಿ...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
            authDomain: "sykolive-846a3.firebaseapp.com", 
            projectId: "sykolive-846a3" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const preview = document.getElementById('preview');
        const plus = document.getElementById('plus');

        // ಫೋಟೋ ಅಪ್‌ಲೋಡ್ ಮತ್ತು ಪ್ರಿವ್ಯೂ
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    preview.src = reader.result;
                    preview.style.display = 'block';
                    plus.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // ಹಳೆಯ ಡೇಟಾ ಇದ್ದರೆ ಲೋಡ್ ಮಾಡುವುದು
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userName').value = data.name || "";
                    document.getElementById('userAge').value = data.age || "";
                    document.getElementById('userRate').value = data.rate || "1500";
                    if (data.profilePic) {
                        preview.src = data.profilePic;
                        preview.style.display = 'block';
                        plus.style.display = 'none';
                    }
                }
            }
        });

        // ಸೇವ್ ಬಟನ್ ಮೇಲೆ ಕ್ಲಿಕ್ ಮಾಡಿದಾಗ
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const name = document.getElementById('userName').value;
            const age = document.getElementById('userAge').value;
            const rate = document.getElementById('userRate').value;
            const pic = preview.src;

            if (!name || !age || !pic || pic === "" || pic.includes("window.location")) {
                alert("ದಯವಿಟ್ಟು ಫೋಟೋ ಮತ್ತು ಎಲ್ಲ ವಿವರಗಳನ್ನು ಭರ್ತಿ ಮಾಡಿ!");
                return;
            }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('saveBtn').disabled = true;

            try {
                // Firebase ನಲ್ಲಿ ಎಲ್ಲ ವಿವರಗಳನ್ನು ಸೇವ್ ಮಾಡುವುದು (UID ಸೇರಿದಂತೆ)
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    age: age,
                    rate: rate,
                    profilePic: pic,
                    email: user.email,
                    uid: user.uid, // ಇದು ಚಾಟಿಂಗ್ ಮತ್ತು ವಿಡಿಯೋ ಕಾಲಿಂಗ್‌ಗೆ ಅವಶ್ಯಕ
                    status: "online",
                    timestamp: new Date().getTime()
                });

                // ಸೇವ್ ಆದ ನಂತರ ಹೋಮ್ ಪೇಜ್‌ಗೆ ಹೋಗುತ್ತದೆ
                window.location.href = "home.html"; 
            } catch (error) {
                alert("ಸೇವ್ ಮಾಡಲು ದೋಷ ಉಂಟಾಗಿದೆ: " + error.message);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('saveBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
